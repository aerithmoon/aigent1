<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AERIA — AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

  <style>
    :root {
      --bg:        #0E0F1A;
      --bg-sb:     #0A0B14;
      --s1:        #141526;
      --s2:        #1C1D30;
      --s3:        #232438;
      --s4:        #2B2C44;
      --border:    #252640;
      --border2:   #2E2F50;
      --text:      #ECEEFF;
      --dim:       #7C7FA8;
      --muted:     #3E4068;
      --accent:    #7C8FFF;
      --acc2:      #9AABFF;
      --acc3:      rgba(124,143,255,.13);
      --acc4:      rgba(124,143,255,.25);
      --acc-glow:  rgba(124,143,255,.4);
      --lilac:     #C084FC;
      --lilac-s:   rgba(192,132,252,.13);
      --lilac-b:   rgba(192,132,252,.25);
      --user-bg:   #1A1B38;
      --danger:    #FF6B7A;
      --dan-s:     rgba(255,107,122,.12);
      --ok:        #4ECCA3;
      --warn:      #FFB347;
      --mem-color: #C084FC;
      --mem-s:     rgba(192,132,252,.13);
      --code-bg:   #090A14;
      --r:         14px;
      --rsm:       10px;
      --sbw:       268px;
      --font:      'Bricolage Grotesque', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --aria-font: 'Cinzel Decorative', serif;
      --t:         0.18s ease;

      /* Mobile safe areas */
      --sab: env(safe-area-inset-bottom, 0px);
      --sat: env(safe-area-inset-top, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; height: 100dvh; }

    body {
      height: 100%; height: 100dvh;
      font-family: var(--font); font-size: 15px;
      background: var(--bg); color: var(--text); line-height: 1.6;
      overflow: hidden;
      /* Prevent mobile zoom on input focus */
      -webkit-text-size-adjust: 100%;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ═══════════════════════════════
       BACKGROUND DECORATION
    ═══════════════════════════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 45% at 15% -5%, rgba(124,143,255,.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 105%, rgba(192,132,252,.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(124,143,255,.03) 0%, transparent 70%);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,143,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,143,255,.022) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, black 20%, transparent 75%);
    }

    /* ═══════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; padding-bottom: calc(24px + var(--sab));
      transition: opacity .4s ease, transform .4s ease;
    }
    #loginScreen.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 22px; padding: 38px 32px;
      box-shadow: 0 0 0 1px rgba(124,143,255,.06), 0 32px 80px rgba(0,0,0,.7);
      position: relative; overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute; top: -70px; right: -70px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(192,132,252,.1), transparent 70%);
      pointer-events: none;
    }
    .login-card::after {
      content: '';
      position: absolute; bottom: -50px; left: -50px;
      width: 150px; height: 150px; border-radius: 50%;
      background: radial-gradient(circle, rgba(124,143,255,.07), transparent 70%);
      pointer-events: none;
    }

    .login-glyph {
      width: 52px; height: 52px; border-radius: 15px;
      background: linear-gradient(135deg, rgba(124,143,255,.2), rgba(192,132,252,.15));
      border: 1px solid var(--acc4);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 18px;
      box-shadow: 0 0 24px rgba(124,143,255,.18);
    }

    .login-brand {
      font-family: var(--aria-font);
      font-size: 26px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(135deg, var(--acc2), var(--lilac));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 3px;
    }
    .login-sub { font-size: 13px; color: var(--dim); margin-bottom: 26px; }

    .lf { margin-bottom: 14px; }
    .ll {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .6px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px;
    }
    .li-wrap { position: relative; }
    .li {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: var(--rsm); color: var(--text); font-family: var(--font);
      font-size: 15px; /* min 16px prevents zoom on iOS, but 15 is ok with viewport meta */
      padding: 11px 42px 11px 13px; outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .li:focus { border-color: var(--acc-glow); box-shadow: 0 0 0 3px rgba(124,143,255,.09); }
    .li::placeholder { color: var(--muted); }

    .show-pw {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--dim); cursor: pointer;
      padding: 4px; border-radius: 5px; transition: color var(--t);
      display: flex; align-items: center;
    }
    .show-pw:hover { color: var(--acc2); }

    .l-err {
      font-size: 12.5px; color: var(--danger);
      background: var(--dan-s); border: 1px solid rgba(255,107,122,.2);
      border-radius: var(--rsm); padding: 9px 12px; margin-bottom: 12px; display: none;
    }
    .l-err.show { display: block; }

    .l-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--lilac));
      color: #fff; border: none; border-radius: var(--rsm);
      font-family: var(--font); font-size: 14.5px; font-weight: 600;
      cursor: pointer; transition: opacity var(--t), transform var(--t), box-shadow var(--t);
      box-shadow: 0 4px 22px rgba(124,143,255,.32);
      margin-top: 4px;
    }
    .l-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 26px rgba(124,143,255,.42); }
    .l-btn:active { transform: translateY(0); }
    .l-btn:disabled { background: var(--s4); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ═══════════════════════════════
       APP SHELL
    ═══════════════════════════════ */
    #app {
      display: flex;
      height: 100%; height: 100dvh;
      overflow: hidden; position: relative; z-index: 1;
      opacity: 0; pointer-events: none; transition: opacity .4s ease;
    }
    #app.visible { opacity: 1; pointer-events: all; }

    /* ═══════════════════════════════
       SIDEBAR
    ═══════════════════════════════ */
    #sidebar {
      width: var(--sbw); min-width: var(--sbw);
      background: var(--bg-sb);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50; transition: transform var(--t);
      position: relative;
    }
    #sidebar::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--lilac), transparent);
      opacity: .5;
    }

    .sb-head { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--lilac));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--aria-font); font-size: 11px; font-weight: 700;
      color: #fff; flex-shrink: 0; letter-spacing: .5px;
      box-shadow: 0 4px 14px rgba(124,143,255,.4);
      cursor: pointer; transition: transform var(--t), box-shadow var(--t);
    }
    .logo-icon:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(124,143,255,.5); }
    .logo-name {
      font-family: var(--aria-font);
      font-size: 16px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(135deg, var(--acc2), var(--lilac));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; cursor: pointer;
    }
    .logo-name:hover { opacity: .8; }
    .logo-badge {
      font-size: 9.5px; font-weight: 600; color: var(--lilac);
      background: var(--lilac-s); padding: 2px 7px;
      border-radius: 99px; margin-left: auto;
      border: 1px solid var(--lilac-b);
    }

    #newChatBtn {
      width: 100%; padding: 9px 12px;
      background: var(--acc3); color: var(--acc2);
      border: 1px solid var(--acc4); border-radius: var(--rsm);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all var(--t);
    }
    #newChatBtn:hover { background: rgba(124,143,255,.2); border-color: var(--acc-glow); }

    .sb-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .sb-tab {
      flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 500;
      color: var(--dim); background: none; border: none;
      cursor: pointer; transition: all var(--t); font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 5px;
      position: relative;
    }
    .sb-tab.active { color: var(--acc2); }
    .sb-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--lilac));
      border-radius: 99px;
    }
    .sb-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.02); }

    .sb-badge {
      background: var(--mem-s); color: var(--mem-color);
      border-radius: 99px; padding: 1px 6px; font-size: 10px;
      border: 1px solid var(--lilac-b);
    }

    .sb-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .sb-panel.active { display: flex; }
    .sb-scroll { flex: 1; overflow-y: auto; padding: 6px; }

    .sess-item {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; transition: background var(--t);
    }
    .sess-item:hover { background: var(--s2); }
    .sess-item.active { background: var(--acc3); }
    .sess-item.active .sess-name { color: var(--acc2); }
    .sess-icon { font-size: 12px; opacity: .5; flex-shrink: 0; }
    .sess-name { font-size: 12.5px; color: var(--dim); white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .sess-del {
      opacity: 0; background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 12px;
      transition: all var(--t); flex-shrink: 0;
    }
    .sess-item:hover .sess-del { opacity: 1; }
    .sess-del:hover { color: var(--danger); background: var(--dan-s); }

    .mem-item {
      padding: 9px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border);
      background: var(--s2); margin-bottom: 6px; transition: border-color var(--t);
    }
    .mem-item:hover { border-color: var(--lilac-b); }
    .mem-type {
      font-size: 9.5px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--mem-color);
      background: var(--mem-s); padding: 1px 6px; border-radius: 99px;
      display: inline-block; margin-bottom: 5px;
    }
    .mem-content { font-size: 12px; color: var(--dim); line-height: 1.5; }
    .mem-ts { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .mem-del { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0; transition: color var(--t); }
    .mem-del:hover { color: var(--danger); }
    .mem-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 24px 12px; line-height: 1.7; }
    .mem-hint { font-size: 11px; color: var(--muted); background: var(--s2); border: 1px solid var(--border); border-radius: var(--rsm); padding: 8px 10px; margin: 8px 6px; line-height: 1.6; }

    .sb-foot { padding: 10px 6px; border-top: 1px solid var(--border); padding-bottom: calc(10px + var(--sab)); }
    .sb-foot-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; background: none; border: none;
      color: var(--dim); font-family: var(--font); font-size: 12.5px;
      transition: all var(--t); width: 100%; text-align: left;
    }
    .sb-foot-btn:hover { background: var(--s2); color: var(--text); }
    .sb-foot-btn.danger:hover { background: var(--dan-s); color: var(--danger); }

    /* ═══════════════════════════════
       MAIN
    ═══════════════════════════════ */
    #main {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      overflow: hidden;
    }

    #chatHeader {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      padding-top: calc(12px + var(--sat));
      border-bottom: 1px solid var(--border);
      background: rgba(14,15,26,.9);
      backdrop-filter: blur(14px);
      flex-shrink: 0; position: relative; z-index: 10;
    }

    #menuBtn {
      display: none; background: none; border: none; color: var(--dim);
      cursor: pointer; padding: 6px; border-radius: 8px;
      transition: all var(--t); flex-shrink: 0;
    }
    #menuBtn:hover { background: var(--s2); color: var(--text); }

    #ariaHeaderLogo {
      font-family: var(--aria-font);
      font-size: 15px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(135deg, var(--acc2), var(--lilac));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; cursor: pointer; flex-shrink: 0;
      transition: opacity var(--t);
    }
    #ariaHeaderLogo:hover { opacity: .7; }

    #sessionTitle {
      flex: 1; font-size: 13.5px; font-weight: 500; color: var(--dim);
      outline: none; cursor: text; padding: 3px 7px; border-radius: 6px;
      transition: background var(--t), color var(--t);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #sessionTitle:hover { background: var(--s2); color: var(--text); }
    #sessionTitle:focus { background: var(--s2); color: var(--text); }

    .hdr-r { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    #statusBar { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
    .sdot.loading { background: var(--warn); animation: blink 1.2s ease-in-out infinite; }
    .sdot.offline { background: var(--danger); }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);} }

    .hdr-btn {
      padding: 5px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: none;
      color: var(--dim); font-family: var(--font); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all var(--t); white-space: nowrap;
    }
    .hdr-btn:hover { background: var(--s2); color: var(--text); border-color: var(--border2); }
    .hdr-btn.danger:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }

    /* ═══════════════════════════════
       MESSAGES
    ═══════════════════════════════ */
    #messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 0 8px;
      display: flex; flex-direction: column;
      /* Critical for mobile: use remaining space */
      min-height: 0;
    }

    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 20px; gap: 14px;
      animation: fadeUp .5s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }

    .welcome-orb {
      width: 68px; height: 68px; border-radius: 20px; position: relative;
      background: linear-gradient(135deg, rgba(124,143,255,.18), rgba(192,132,252,.12));
      border: 1px solid var(--acc4);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(124,143,255,.15), inset 0 0 20px rgba(124,143,255,.06);
    }
    .welcome-orb-text {
      font-family: var(--aria-font);
      font-size: 20px; font-weight: 700; letter-spacing: .5px;
      background: linear-gradient(135deg, var(--acc2), var(--lilac));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-title {
      font-size: 21px; font-weight: 700; color: var(--text);
      letter-spacing: -.4px; text-align: center;
    }
    .welcome-sub {
      font-size: 13.5px; color: var(--dim); text-align: center;
      max-width: 340px; line-height: 1.7;
    }

    .chips {
      display: flex; flex-wrap: wrap; gap: 7px;
      justify-content: center; max-width: 500px; padding: 0 8px;
    }
    .chip {
      padding: 7px 13px; border-radius: 99px;
      border: 1px solid var(--border2); background: var(--s2);
      color: var(--dim); font-size: 12.5px; cursor: pointer;
      transition: all var(--t); font-family: var(--font);
    }
    .chip:hover {
      border-color: var(--acc4); color: var(--acc2); background: var(--acc3);
      box-shadow: 0 0 14px rgba(124,143,255,.14);
    }

    /* Messages */
    .msg-row {
      display: flex; padding: 3px 16px;
      animation: msgIn .22s ease forwards;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);} }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-bubble {
      max-width: min(80%, 680px);
      padding: 10px 14px; border-radius: var(--r);
      font-size: 14.5px; line-height: 1.72;
    }
    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(124,143,255,.2);
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      background: transparent;
      border-left: 2px solid rgba(124,143,255,.22);
      padding-left: 14px;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 5px; opacity: 0; transition: opacity var(--t); flex-wrap: wrap;
    }
    .msg-row:hover .msg-meta { opacity: 1; }
    .msg-time { font-size: 10.5px; color: var(--muted); }
    .msg-action {
      background: none; border: 1px solid var(--border2); color: var(--muted);
      border-radius: 4px; padding: 2px 7px; font-size: 10.5px;
      cursor: pointer; font-family: var(--font); transition: all var(--t);
      display: flex; align-items: center; gap: 3px;
    }
    .msg-action:hover { background: var(--s3); color: var(--text); }
    .msg-action.del:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }
    .msg-action.dl { color: var(--ok); border-color: rgba(78,204,163,.25); }
    .msg-action.dl:hover { background: rgba(78,204,163,.1); color: var(--ok); }

    .search-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--warn);
      background: rgba(255,179,71,.09); border: 1px solid rgba(255,179,71,.2);
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    }
    .mem-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--mem-color);
      background: var(--mem-s); border: 1px solid var(--lilac-b);
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    }
    .file-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--s3); border: 1px solid var(--border2);
      border-radius: var(--rsm); padding: 4px 9px;
      font-size: 11.5px; color: var(--dim); margin-bottom: 7px; margin-right: 5px;
    }

    /* Markdown styles */
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,
    .msg-bubble h4,.msg-bubble h5,.msg-bubble h6 { color:var(--text);margin:14px 0 5px;font-weight:600;letter-spacing:-.2px; }
    .msg-bubble h1{font-size:17px;} .msg-bubble h2{font-size:15.5px;} .msg-bubble h3{font-size:14.5px;}
    .msg-bubble p{margin-bottom:9px;} .msg-bubble p:last-child{margin-bottom:0;}
    .msg-bubble ul,.msg-bubble ol{padding-left:18px;margin-bottom:9px;}
    .msg-bubble li{margin-bottom:3px;}
    .msg-bubble strong{color:var(--text);font-weight:600;}
    .msg-bubble em{color:var(--dim);}
    .msg-bubble a{color:var(--acc2);text-decoration:none;border-bottom:1px solid rgba(154,171,255,.3);}
    .msg-bubble code{font-family:var(--mono);font-size:12.5px;background:var(--s4);color:#B0CFFF;padding:1px 5px;border-radius:4px;}
    .msg-bubble pre{background:var(--code-bg)!important;border:1px solid var(--border2);border-radius:var(--rsm);padding:13px 15px;overflow-x:auto;margin:9px 0;position:relative;}
    .msg-bubble pre code{background:transparent!important;padding:0;border-radius:0;color:inherit;font-size:12.5px;}
    .copy-code{position:absolute;top:7px;right:7px;background:var(--s4);border:1px solid var(--border2);color:var(--dim);border-radius:5px;padding:2px 8px;font-size:10.5px;cursor:pointer;font-family:var(--font);opacity:0;transition:opacity var(--t),background var(--t);}
    .msg-bubble pre:hover .copy-code{opacity:1;}
    .copy-code:hover{background:var(--s3);color:var(--text);}
    .dl-code{position:absolute;top:7px;right:66px;background:rgba(78,204,163,.1);border:1px solid rgba(78,204,163,.2);color:var(--ok);border-radius:5px;padding:2px 8px;font-size:10.5px;cursor:pointer;font-family:var(--font);opacity:0;transition:opacity var(--t);display:inline-block;}
    .msg-bubble pre:hover .dl-code{opacity:1;}
    .msg-bubble table{border-collapse:collapse;width:100%;margin:9px 0;font-size:13px;}
    .msg-bubble th,.msg-bubble td{border:1px solid var(--border2);padding:6px 10px;text-align:left;}
    .msg-bubble th{background:var(--s3);color:var(--text);font-weight:600;}
    .msg-bubble td{color:var(--dim);}
    .msg-bubble tr:hover td{background:var(--s3);color:var(--text);}
    .msg-bubble blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:7px 0;color:var(--dim);}
    .msg-bubble hr{border:none;border-top:1px solid var(--border2);margin:10px 0;}

    /* Typing indicator */
    .typing-row{display:flex;padding:8px 16px;align-items:center;gap:10px;animation:msgIn .2s ease forwards;}
    .typing-dots{display:flex;gap:4px;}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
    .typing-dot:nth-child(1){animation:tb 1.2s 0s ease-in-out infinite;}
    .typing-dot:nth-child(2){animation:tb 1.2s .2s ease-in-out infinite;}
    .typing-dot:nth-child(3){animation:tb 1.2s .4s ease-in-out infinite;}
    @keyframes tb{0%,60%,100%{transform:translateY(0);background:var(--muted);}30%{transform:translateY(-6px);background:var(--accent);}}
    .typing-label{font-size:11.5px;color:var(--muted);}

    /* ═══════════════════════════════
       INPUT AREA — FIXED BOTTOM
    ═══════════════════════════════ */
    #inputWrap {
      flex-shrink: 0;
      padding: 8px 16px;
      padding-bottom: calc(12px + var(--sab));
      border-top: 1px solid rgba(37,38,64,.7);
      background: rgba(14,15,26,.85);
      backdrop-filter: blur(14px);
      /* Critical: stay at bottom */
      position: relative; z-index: 5;
    }

    #filePreview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px;}
    #filePreview:empty{display:none;}
    .file-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border2);border-radius:var(--rsm);padding:4px 9px;font-size:11.5px;color:var(--dim);max-width:200px;}
    .file-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fc-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;transition:color var(--t);flex-shrink:0;padding:0;}
    .fc-del:hover{color:var(--danger);}

    .input-box {
      display: flex; align-items: center; gap: 6px;
      background: var(--s1); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 10px 10px 10px 16px;
      transition: border-color var(--t), box-shadow var(--t);
      min-height: 52px;
    }
    .input-box:focus-within {
      border-color: rgba(124,143,255,.4);
      box-shadow: 0 0 0 3px rgba(124,143,255,.07), 0 0 20px rgba(124,143,255,.05);
    }

    #msgInput {
      flex: 1; outline: none; background: transparent; color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.5;
      min-height: 24px; max-height: 120px; overflow-y: auto; word-break: break-word;
      align-self: center;
    }
    #msgInput:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }

    .input-icons{display:flex;align-items:center;gap:3px;flex-shrink:0;}
    .ico-btn{width:32px;height:32px;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--t);}
    .ico-btn:hover{background:var(--s3);color:var(--dim);}

    #sendBtn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--lilac));
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t); flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(124,143,255,.32);
    }
    #sendBtn:hover{opacity:.9;transform:scale(1.06);box-shadow:0 6px 20px rgba(124,143,255,.42);}
    #sendBtn:disabled{background:var(--s4);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}

    .input-hint{text-align:center;font-size:10.5px;color:var(--muted);margin-top:7px;}

    /* Toast */
    #toast{position:fixed;bottom:calc(22px + var(--sab));left:50%;transform:translateX(-50%) translateY(50px);background:var(--s4);border:1px solid var(--border2);color:var(--text);padding:8px 18px;border-radius:99px;font-size:12.5px;z-index:999;pointer-events:none;opacity:0;transition:transform .28s ease,opacity .28s ease;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.5);}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    /* Mobile overlay */
    #mobOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:40;backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .2s;}
    #mobOverlay.show{opacity:1;pointer-events:all;}

    /* ═══════════════════════════════
       RESPONSIVE MOBILE
    ═══════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
        /* Full height including safe areas */
        height: 100%; height: 100dvh;
      }
      #sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,.7); }
      #mobOverlay { display: block; }
      #menuBtn { display: flex; }
      .msg-bubble { max-width: 92%; font-size: 14px; }
      #inputWrap { padding: 7px 12px; padding-bottom: calc(10px + var(--sab)); }
      #statusBar { display: none; }
      #ariaHeaderLogo { font-size: 13px; }
      #sessionTitle { font-size: 12.5px; }
      .hdr-btn span { display: none; } /* hide text on mobile, keep icon */
      .chips { gap: 6px; }
      .chip { font-size: 12px; padding: 6px 11px; }
      .welcome-title { font-size: 19px; }
      .welcome-sub { font-size: 13px; }
      .msg-row { padding: 2px 12px; }
      #chatHeader { padding: 10px 12px; padding-top: calc(10px + var(--sat)); }
    }

    @media (max-width: 400px) {
      .login-card { padding: 28px 20px; }
      .login-brand { font-size: 22px; }
    }

    /* Fix for iOS Safari: prevent keyboard from pushing content */
    @supports (-webkit-touch-callout: none) {
      #main { height: -webkit-fill-available; }
    }
  </style>
</head>

              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
'use strict';

// ════════════════════════════════════
//  ★ ISI URL GAS LO DI SINI
// ════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzPuH6i9BFqDEGTbGvyQ6tDARwU22yf5mR7W-Uk6eWG5ALgS2mAVOAgwCDAXd54kcu_/exec';

// ════════════════════════════════════
//  🔐 AUTH
// ════════════════════════════════════
// SHA-256 dari "aerith_alpha:alphamoon71"
const AUTH_HASH = 'afa0237b4facb362207ba2eedd3464d75688e150298e29389724c5b959bd4735';
const MAX_FILE  = 50 * 1024 * 1024;

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
const S = {
  sessions: [], curId: null,
  files: [], loading: false,
  memories: [],
  showingHome: false
};

// ════════════════════════════════════
//  BOOT — refresh = new chat, lama tetap tersimpan
// ════════════════════════════════════
(function boot() {
  showApp();
})();

// ════════════════════════════════════
//  LOGIN
// ════════════════════════════════════
function togglePw() {
  const inp  = document.getElementById('li-p');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type = 'password';
    icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const u   = document.getElementById('li-u').value.trim();
  const p   = document.getElementById('li-p').value;
  const err = document.getElementById('loginErr');
  btn.disabled = true; err.classList.remove('show');
  try {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(u + ':' + p));
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    if (hash === AUTH_HASH) {
      sessionStorage.setItem('aria_auth', '1');
      showApp();
    } else {
      err.classList.add('show');
      document.getElementById('li-p').value = '';
      document.getElementById('li-p').focus();
    }
  } catch(e) { err.textContent = 'Error: ' + e.message; err.classList.add('show'); }
  btn.disabled = false;
}

function showApp() {
  document.getElementById('app').classList.add('visible');
  initApp();
}

function logout() { sessionStorage.removeItem('aria_auth'); location.reload(); }

// ════════════════════════════════════
//  APP INIT — refresh selalu buat sesi baru, lama disimpan
// ════════════════════════════════════
function initApp() {
  loadStorage();
  setupMarked();
  // Refresh = selalu mulai sesi baru (tapi sesi lama tetap di sidebar)
  newSession(true);
  renderSidebar();
  setStatus('online');
  loadMemories();
}

function setupMarked() {
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    },
    breaks: true, gfm: true
  });
}

// ════════════════════════════════════
//  STORAGE
// ════════════════════════════════════
function loadStorage() {
  try { S.sessions = JSON.parse(localStorage.getItem('aria_sessions') || '[]'); } catch(_) { S.sessions = []; }
}
function saveStorage() {
  try { localStorage.setItem('aria_sessions', JSON.stringify(S.sessions)); } catch(e) {}
}

// ════════════════════════════════════
//  SESSIONS
// ════════════════════════════════════
function newSession(save = true) {
  const id = 'ss_' + Date.now();
  const obj = { id, name: 'New Chat', created: Date.now(), messages: [] };
  S.sessions.unshift(obj);
  S.curId = id;
  if (save) saveStorage();
  renderSidebar();
  renderMsgs();
  setTitle('New Chat');
  closeSb();
  document.getElementById('regenBtn').style.display = 'none';
}

function switchSession(id, save = true) {
  S.curId = id;
  if (save) saveStorage();
  renderSidebar(); renderMsgs();
  setTitle(getCur()?.name || 'New Chat'); closeSb();
  document.getElementById('regenBtn').style.display =
    (getCur()?.messages?.length > 1) ? 'flex' : 'none';
}

function deleteSession(id, ev) {
  ev?.stopPropagation();
  S.sessions = S.sessions.filter(s => s.id !== id);
  if (S.curId === id) {
    if (S.sessions.length) S.curId = S.sessions[0].id;
    else { newSession(false); return; }
  }
  saveStorage(); renderSidebar(); renderMsgs();
  setTitle(getCur()?.name || 'New Chat');
}

function renameSession(name) {
  const s = getCur(); if (!s) return;
  const n = name.trim();
  if (n && n !== s.name) { s.name = n; saveStorage(); renderSidebar(); }
}

function autoName(msg) {
  const s = getCur(); if (!s || s.name !== 'New Chat') return;
  s.name = msg.substring(0, 34) + (msg.length > 34 ? '…' : '');
  setTitle(s.name); renderSidebar(); saveStorage();
}

function getCur() { return S.sessions.find(s => s.id === S.curId) || null; }

// ════════════════════════════════════
//  GO HOME — klik ARIA → welcome screen
// ════════════════════════════════════
function goHome() {
  const wrap = document.getElementById('messages');
  wrap.innerHTML = welcomeHtml();
  setTitle('New Chat');
  S.showingHome = true;
  document.getElementById('regenBtn').style.display = 'none';
  closeSb();
}

// ════════════════════════════════════
//  SIDEBAR TABS
// ════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabChats').classList.toggle('active', tab === 'chats');
  document.getElementById('tabMemory').classList.toggle('active', tab === 'memory');
  document.getElementById('panelChats').classList.toggle('active', tab === 'chats');
  document.getElementById('panelMemory').classList.toggle('active', tab === 'memory');
  if (tab === 'memory') loadMemories();
}

// ════════════════════════════════════
//  RENDER SIDEBAR
// ════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sessionList');
  const sessions = S.sessions.filter(s => s.messages.length > 0); // hanya tampil yang ada isinya
  if (!sessions.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:12px;padding:20px 10px">Belum ada chat</p>`;
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="sess-item ${s.id === S.curId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="sess-icon">💬</span>
      <span class="sess-name">${esc(s.name)}</span>
      <button class="sess-del" onclick="deleteSession('${s.id}',event)">✕</button>
    </div>`).join('');
}

// ════════════════════════════════════
//  MEMORY
// ════════════════════════════════════
async function loadMemories() {
  if (!GAS_URL || GAS_URL === 'PASTE_URL_GAS_LO_DI_SINI') return;
  try {
    const res  = await fetch(GAS_URL + '?action=get_memories');
    const data = await res.json();
    if (data.success) { S.memories = data.memories || []; renderMemoryPanel(); updateMemBadge(); }
  } catch(e) {}
}

function renderMemoryPanel() {
  const el     = document.getElementById('memoryList');
  const active = S.memories.filter(m => m.active === true || m.active === 'TRUE' || m.active === 1);
  if (!active.length) {
    el.innerHTML = `<div class="mem-empty">🧠 Belum ada memori.<br><br>Ketik <strong>"ingat bahwa..."</strong> di chat.</div>`;
    return;
  }
  el.innerHTML = active.map(m => `
    <div class="mem-item">
      <button class="mem-del" onclick="deleteMem('${esc(m.id)}')">✕</button>
      <span class="mem-type">${esc(m.type || 'fact')}</span>
      <div class="mem-content">${esc(m.content)}</div>
      <div class="mem-ts">${esc(m.timestamp || '')}</div>
    </div>`).join('');
}

function updateMemBadge() {
  const active = S.memories.filter(m => m.active === true || m.active === 'TRUE' || m.active === 1);
  document.getElementById('memCount').textContent = active.length;
}

async function deleteMem(id) {
  if (!confirm('Hapus memori ini?')) return;
  try {
    await fetch(GAS_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete_memory', memoryId: id })
    });
    await loadMemories(); toast('🗑️ Memori dihapus');
  } catch(e) { toast('❌ Gagal'); }
}

// ════════════════════════════════════
//  RENDER MESSAGES
// ════════════════════════════════════
function renderMsgs() {
  const wrap = document.getElementById('messages');
  const s    = getCur();
  S.showingHome = false;
  if (!s || !s.messages.length) { wrap.innerHTML = welcomeHtml(); return; }
  wrap.innerHTML = s.messages.map(msgHtml).join('');
  wrap.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el); addCodeBtns(el.closest('pre'));
  });
  scrollBot();
}

function welcomeHtml() {
  return `<div id="welcome">
    <div class="welcome-orb"><span class="welcome-orb-text">A</span></div>
    <h1 class="welcome-title">Hai, Aeria di sini! ✨</h1>
    <p class="welcome-sub">Asisten AI yang siap menemani kegiatanmu sepanjang hari. Kamu lagi butuh bantuan apa hari ini?</p>
    <div class="chips">
      <button class="chip" onclick="quickSend('Jelaskan machine learning secara sederhana')">🧠 Machine Learning</button>
      <button class="chip" onclick="quickSend('Bantu brainstorming ide startup tech inovatif')">💡 Ide Startup</button>
      <button class="chip" onclick="quickSend('Cari berita AI terkini')">🔍 Berita AI</button>
      <button class="chip" onclick="quickSend('Tulis Python web scraper dengan requests dan BeautifulSoup')">💻 Python Code</button>
      <button class="chip" onclick="quickSend('Bandingkan React vs Vue vs Angular')">⚖️ Framework</button>
      <button class="chip" onclick="quickSend('Buat strategi digital marketing budget minim')">📈 Marketing</button>
      <button class="chip" onclick="quickSend('ingat bahwa aku lebih suka jawaban singkat')">🧠 Set Memori</button>
      <button class="chip" onclick="quickSend('tampilkan memori')">📋 Lihat Memori</button>
    </div>
  </div>`;
}

function msgHtml(msg) {
  const isUser = msg.role === 'user';
  const time   = new Date(msg.ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  const fileBadges = (msg.files || []).map(f =>
    `<div class="file-badge">${fileIcon(f.type || '')} ${esc(f.name)}</div>`).join('');
  const searchBadge = msg.searchUsed ? `<div class="search-badge">🔍 Web search</div>` : '';
  const memBadge    = msg.memoryAction ? `<div class="mem-badge">🧠 Memori ${esc(msg.memoryAction)}</div>` : '';
  const body = isUser
    ? `<div style="white-space:pre-wrap">${esc(msg.content)}</div>`
    : marked.parse(msg.content || '');
  const hasCode = !isUser && (msg.content || '').includes('```');

  return `
  <div class="msg-row ${msg.role}" data-id="${msg.id}">
    <div>
      ${searchBadge}${memBadge}${fileBadges}
      <div class="msg-bubble">${body}</div>
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        <button class="msg-action" onclick="copyMsg('${msg.id}')">📋 Salin</button>
        ${hasCode ? `<button class="msg-action dl" onclick="downloadCode('${msg.id}')">⬇ Download</button>` : ''}
        <button class="msg-action del" onclick="deleteMsg('${msg.id}')">🗑 Hapus</button>
      </div>
    </div>
  </div>`;
}

function appendMsg(msg) {
  const wrap = document.getElementById('messages');
  const wel  = wrap.querySelector('#welcome');
  if (wel) wrap.innerHTML = '';
  S.showingHome = false;
  const div = document.createElement('div');
  div.innerHTML = msgHtml(msg);
  const row = div.firstElementChild;
  wrap.appendChild(row);
  row.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el); addCodeBtns(el.closest('pre'));
  });
  scrollBot();
}

function addMsg(role, content, extra = {}) {
  // Jika sedang di home screen, mulai tampilkan chat di sesi sekarang
  S.showingHome = false;
  const s = getCur(); if (!s) return null;
  const msg = {
    id: 'msg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    role, content, ts: Date.now(), ...extra
  };
  s.messages.push(msg);
  saveStorage();
  appendMsg(msg);
  renderSidebar(); // update sidebar setelah pesan pertama
  return msg;
}

function deleteMsg(id) {
  const s = getCur(); if (!s) return;
  s.messages = s.messages.filter(m => m.id !== id);
  saveStorage();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.style.transition = '.18s'; el.style.opacity = '0'; el.style.transform = 'scale(.96)'; setTimeout(() => el.remove(), 200); }
  if (!s.messages.length) renderMsgs();
}

function copyMsg(id) {
  const s = getCur(); if (!s) return;
  const m = s.messages.find(x => x.id === id); if (!m) return;
  navigator.clipboard.writeText(m.content).then(() => toast('✓ Disalin'));
}

function downloadCode(id) {
  const s = getCur(); if (!s) return;
  const m = s.messages.find(x => x.id === id); if (!m) return;
  const match = m.content.match(/```(\w*)\n?([\s\S]*?)```/);
  if (!match) { navigator.clipboard.writeText(m.content); toast('✓ Disalin'); return; }
  const lang = match[1] || 'txt';
  const code = match[2];
  const ext  = { python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',cpp:'cpp',c:'c',go:'go',rust:'rs',php:'php',sql:'sql',bash:'sh' }[lang.toLowerCase()] || 'txt';
  const blob = new Blob([code], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'aria_' + Date.now() + '.' + ext });
  a.click(); URL.revokeObjectURL(url); toast('⬇ Diunduh');
}

function addCodeBtns(pre) {
  if (!pre || pre.querySelector('.copy-code')) return;
  const lang = (pre.querySelector('code')?.className || '').replace('language-', '') || 'txt';
  const btn  = Object.assign(document.createElement('button'), { className: 'copy-code', textContent: 'Salin' });
  btn.onclick = () => navigator.clipboard.writeText(pre.querySelector('code').textContent)
    .then(() => { btn.textContent = 'Tersalin!'; setTimeout(() => btn.textContent = 'Salin', 1500); });
  pre.appendChild(btn);
  const ext    = { python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',cpp:'cpp',c:'c',go:'go',rust:'rs',php:'php',sql:'sql',bash:'sh' }[lang.toLowerCase()] || 'txt';
  const dlBtn  = document.createElement('button');
  dlBtn.className = 'dl-code'; dlBtn.textContent = '⬇';
  dlBtn.onclick = () => {
    const blob = new Blob([pre.querySelector('code').textContent], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: 'aria_code_' + Date.now() + '.' + ext });
    a.click(); URL.revokeObjectURL(url); toast('⬇ Kode diunduh');
  };
  pre.appendChild(dlBtn);
}

function confirmClearChat() {
  if (!confirm('Hapus semua pesan di chat ini?')) return;
  const s = getCur(); if (!s) return;
  s.messages = []; saveStorage(); renderMsgs();
  document.getElementById('regenBtn').style.display = 'none';
}

function confirmClearAll() {
  if (!confirm('Hapus SEMUA sesi chat?')) return;
  S.sessions = []; saveStorage(); newSession(false); renderSidebar(); renderMsgs();
  toast('✓ Semua chat dihapus');
}

function exportChat() {
  const s = getCur();
  if (!s || !s.messages.length) { toast('⚠ Tidak ada chat'); return; }
  let txt = `AERIA Chat Export\nSesi: ${s.name}\nTanggal: ${new Date().toLocaleString('id-ID')}\n${'═'.repeat(50)}\n\n`;
  s.messages.forEach(m => {
    const who  = m.role === 'user' ? 'Kamu' : 'AERIA';
    const time = new Date(m.ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    txt += `[${time}] ${who}:\n${m.content}\n\n${'─'.repeat(40)}\n\n`;
  });
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: 'aria_chat_' + Date.now() + '.txt' });
  a.click(); URL.revokeObjectURL(url); toast('⬇ Chat di-export');
}

// ════════════════════════════════════
//  SEND
// ════════════════════════════════════
async function send() {
  if (S.loading) return;
  const inputEl = document.getElementById('msgInput');
  const text    = inputEl.innerText.trim();
  if (!text && !S.files.length) return;
  if (!GAS_URL || GAS_URL === 'PASTE_URL_GAS_LO_DI_SINI') { toast('⚠ GAS_URL belum diisi!'); return; }

  const s       = getCur();
  const history = s ? s.messages.slice(-30).map(m => ({ role: m.role, content: m.content })) : [];
  const files   = [...S.files];
  const fNames  = files.map(f => ({ name: f.name, size: f.size, type: f.type }));

  inputEl.innerHTML = ''; S.files = [];
  document.getElementById('filePreview').innerHTML = '';
  updSendBtn();
  if (text) autoName(text);
  addMsg('user', text || '[File dilampirkan]', { files: fNames });
  showTyping(); setLoading(true);

  try {
    const filePayload = await toBase64(files);
    const res  = await fetch(GAS_URL, {
      method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ message: text || 'Analisis file.', history, files: filePayload })
    });
    hideTyping();
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.success) {
      addMsg('assistant', data.response, { searchUsed: data.searchUsed, memoryAction: data.memoryAction });
      if (data.memoryAction) loadMemories();
    } else {
      addMsg('assistant', '⚠️ **Error:** ' + esc(data.error || 'Unknown'));
    }
  } catch(err) {
    hideTyping();
    addMsg('assistant', '⚠️ **Koneksi gagal:** ' + esc(err.message));
  }
  setLoading(false);
  document.getElementById('regenBtn').style.display = 'flex';
}

async function regenerateLast() {
  if (S.loading) return;
  const s = getCur(); if (!s || s.messages.length < 2) return;
  const last = s.messages[s.messages.length - 1];
  if (last.role !== 'assistant') return;
  deleteMsg(last.id);
  const prev = s.messages[s.messages.length - 1];
  if (!prev || prev.role !== 'user') return;
  const history = s.messages.slice(0, -1).slice(-30).map(m => ({ role: m.role, content: m.content }));
  showTyping(); setLoading(true);
  try {
    const res  = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ message: prev.content, history, files: [] }) });
    hideTyping();
    const data = await res.json();
    if (data.success) addMsg('assistant', data.response, { searchUsed: data.searchUsed });
    else addMsg('assistant', '⚠️ ' + esc(data.error || 'Error'));
  } catch(err) { hideTyping(); addMsg('assistant', '⚠️ Gagal: ' + esc(err.message)); }
  setLoading(false);
}

function quickSend(text) {
  const el = document.getElementById('msgInput');
  el.innerText = text; updSendBtn(); send();
}

// ════════════════════════════════════
//  FILES
// ════════════════════════════════════
function onFiles(inp) {
  Array.from(inp.files).forEach(f => {
    if (f.size > MAX_FILE) { toast('⚠ ' + f.name + ' > 50MB'); return; }
    S.files.push(f);
  });
  inp.value = ''; renderFilePreviews(); updSendBtn();
}

function renderFilePreviews() {
  document.getElementById('filePreview').innerHTML = S.files.map((f, i) => `
    <div class="file-chip">
      <span>${fileIcon(f.type)}</span>
      <span class="file-chip-name">${esc(f.name)}</span>
      <button class="fc-del" onclick="S.files.splice(${i},1);renderFilePreviews();updSendBtn()">✕</button>
    </div>`).join('');
}

function toBase64(files) {
  return Promise.all(files.map(f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res({ name: f.name, mimeType: f.type || 'application/octet-stream', data: r.result.split(',')[1] });
    r.onerror = () => rej(new Error('File read failed'));
    r.readAsDataURL(f);
  })));
}

// ════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function onInput() { updSendBtn(); }
function updSendBtn() {
  const btn = document.getElementById('sendBtn');
  const txt = document.getElementById('msgInput').innerText.trim();
  btn.disabled = (!txt && !S.files.length) || S.loading;
}
function setLoading(v) { S.loading = v; updSendBtn(); setStatus(v ? 'loading' : 'online'); }
function showTyping() {
  if (document.getElementById('tr')) return;
  const el = document.createElement('div');
  el.id = 'tr'; el.className = 'typing-row';
  el.innerHTML = `<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-label">AERIA sedang berpikir…</span>`;
  document.getElementById('messages').appendChild(el); scrollBot();
}
function hideTyping() { document.getElementById('tr')?.remove(); }
function scrollBot() { const c = document.getElementById('messages'); requestAnimationFrame(() => c.scrollTop = c.scrollHeight); }
function setTitle(n) { document.getElementById('sessionTitle').textContent = n; }
function setStatus(type) {
  const dot = document.getElementById('statusDot'), txt = document.getElementById('statusText');
  if (!dot || !txt) return;
  dot.className = 'sdot ' + type;
  txt.textContent = { online: 'Online', loading: 'Thinking…', offline: 'Offline' }[type] || type;
}
function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
}
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtBytes(b) { if(!b)return''; if(b<1024)return b+'B'; if(b<1048576)return(b/1024).toFixed(1)+'KB'; return(b/1048576).toFixed(1)+'MB'; }
function fileIcon(m) {
  if(!m)return'📄'; if(m.startsWith('image/'))return'🖼'; if(m==='application/pdf')return'📋';
  if(m.includes('word'))return'📝'; if(m.includes('spreadsheet')||m.includes('excel')||m==='text/csv')return'📊';
  if(m.includes('zip')||m.includes('rar'))return'🗜'; if(m.startsWith('text/'))return'📄';
  if(m.startsWith('video/'))return'🎬'; if(m.startsWith('audio/'))return'🎵'; return'📎';
}
