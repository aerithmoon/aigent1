<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

  <style>
    /* ── Variables ── */
    :root {
      --bg:          #0C0D11;
      --bg-sb:       #09090D;
      --s1:          #13141C;
      --s2:          #1A1B25;
      --s3:          #21222E;
      --border:      #22232F;
      --text:        #DFE1F0;
      --dim:         #6A6D85;
      --muted:       #3A3C50;
      --accent:      #5B7DFF;
      --acc-h:       #7A97FF;
      --acc-s:       rgba(91,125,255,.10);
      --acc-g:       rgba(91,125,255,.18);
      --user-bg:     #192048;
      --danger:      #FF5757;
      --dan-s:       rgba(255,87,87,.12);
      --ok:          #3FC790;
      --warn:        #F5A623;
      --code-bg:     #0A0B0F;
      --r:           12px;
      --rsm:         8px;
      --sbw:         260px;
      --font:        'Bricolage Grotesque', sans-serif;
      --mono:        'JetBrains Mono', monospace;
      --t:           0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); font-size: 15px;
                 background: var(--bg); color: var(--text); line-height: 1.6; overflow: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ════════════════════════════════════
       LOGIN SCREEN
    ════════════════════════════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      transition: opacity .4s ease, transform .4s ease;
    }
    #loginScreen.hide {
      opacity: 0; transform: scale(1.03); pointer-events: none;
    }

    .login-card {
      width: 100%; max-width: 380px;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }

    .login-icon {
      width: 52px; height: 52px;
      background: var(--acc-s);
      border: 1px solid var(--acc-g);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }

    .login-title {
      font-size: 22px; font-weight: 600; color: var(--text);
      letter-spacing: -.4px; margin-bottom: 4px;
    }

    .login-sub {
      font-size: 13px; color: var(--dim); margin-bottom: 28px;
    }

    .login-field {
      margin-bottom: 14px;
    }

    .login-label {
      display: block; font-size: 11.5px; font-weight: 600;
      letter-spacing: .4px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px;
    }

    .login-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--rsm);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .login-input:focus {
      border-color: rgba(91,125,255,.45);
      box-shadow: 0 0 0 3px rgba(91,125,255,.07);
    }
    .login-input::placeholder { color: var(--muted); }

    .login-error {
      font-size: 12.5px; color: var(--danger);
      background: var(--dan-s);
      border: 1px solid rgba(255,87,87,.2);
      border-radius: var(--rsm);
      padding: 8px 12px;
      margin-bottom: 14px;
      display: none;
    }
    .login-error.show { display: block; }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--rsm);
      font-family: var(--font);
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--t), transform var(--t);
      margin-top: 4px;
    }
    .login-btn:hover { background: var(--acc-h); transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }
    .login-btn:disabled { background: var(--s3); color: var(--muted); cursor: not-allowed; transform: none; }

    /* ════════════════════════════════════
       APP SHELL
    ════════════════════════════════════ */
    #app {
      display: flex; height: 100vh; overflow: hidden;
      opacity: 0; pointer-events: none;
      transition: opacity .4s ease;
    }
    #app.visible { opacity: 1; pointer-events: all; }

    /* ════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════ */
    #sidebar {
      width: var(--sbw); min-width: var(--sbw);
      background: var(--bg-sb);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50;
      transition: transform var(--t);
    }

    .sb-head {
      padding: 18px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 12px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0; letter-spacing: -.5px;
    }
    .logo-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
    .logo-badge {
      font-size: 9.5px; font-weight: 500; color: var(--dim);
      background: var(--s3); padding: 2px 6px; border-radius: 99px; margin-left: auto;
    }

    #newChatBtn {
      width: 100%; padding: 8px 12px;
      background: var(--acc-s); color: var(--acc-h);
      border: 1px solid var(--acc-g); border-radius: var(--rsm);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: background var(--t), border-color var(--t);
    }
    #newChatBtn:hover { background: rgba(91,125,255,.16); border-color: rgba(91,125,255,.35); }

    .sess-scroll { flex: 1; overflow-y: auto; padding: 6px; }

    .sess-item {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; transition: background var(--t);
    }
    .sess-item:hover { background: var(--s2); }
    .sess-item.active { background: var(--acc-s); }
    .sess-item.active .sess-name { color: var(--acc-h); }
    .sess-icon { font-size: 13px; opacity: .55; flex-shrink: 0; }
    .sess-name { font-size: 12.5px; color: var(--dim); white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .sess-del {
      opacity: 0; background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 12px;
      transition: opacity var(--t), color var(--t), background var(--t);
      flex-shrink: 0;
    }
    .sess-item:hover .sess-del { opacity: 1; }
    .sess-del:hover { color: var(--danger); background: var(--dan-s); }

    .sb-foot {
      padding: 10px 6px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .sb-foot-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; background: none; border: none;
      color: var(--dim); font-family: var(--font); font-size: 12.5px;
      transition: background var(--t), color var(--t); width: 100%; text-align: left;
    }
    .sb-foot-btn:hover { background: var(--s2); color: var(--text); }
    .sb-foot-btn.danger:hover { background: var(--dan-s); color: var(--danger); }

    /* ════════════════════════════════════
       MAIN
    ════════════════════════════════════ */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    #chatHeader {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px; border-bottom: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }

    #menuBtn {
      display: none; background: none; border: none;
      color: var(--dim); cursor: pointer; padding: 5px;
      border-radius: 6px; transition: background var(--t);
    }
    #menuBtn:hover { background: var(--s2); color: var(--text); }

    #sessionTitle {
      flex: 1; font-size: 14.5px; font-weight: 600; color: var(--text);
      outline: none; cursor: text; padding: 3px 6px; border-radius: 5px;
      transition: background var(--t);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -.2px;
    }
    #sessionTitle:hover { background: var(--s2); }
    #sessionTitle:focus { background: var(--s2); }

    .hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    #statusBar { display: flex; align-items: center; gap: 5px;
                 font-size: 11px; color: var(--muted); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%;
                  background: var(--ok); flex-shrink: 0; }
    .status-dot.loading { background: var(--warn); animation: blink 1.2s ease-in-out infinite; }
    .status-dot.offline { background: var(--danger); }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.75); }
    }

    .hdr-btn {
      padding: 6px 11px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: none;
      color: var(--dim); font-family: var(--font); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all var(--t);
    }
    .hdr-btn:hover { background: var(--s2); color: var(--text); }
    .hdr-btn.danger:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }

    /* ════════════════════════════════════
       MESSAGES
    ════════════════════════════════════ */
    #messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; }

    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; gap: 16px;
      animation: fadeUp .5s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .welcome-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--acc-s); border: 1px solid var(--acc-g);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
    }
    .welcome-title { font-size: 20px; font-weight: 600; color: var(--text);
                     letter-spacing: -.4px; text-align: center; }
    .welcome-sub { font-size: 13.5px; color: var(--dim); text-align: center;
                   max-width: 360px; line-height: 1.7; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; max-width: 500px; }
    .chip {
      padding: 7px 13px; border-radius: 99px;
      border: 1px solid var(--border); background: var(--s1);
      color: var(--dim); font-size: 12.5px; cursor: pointer;
      transition: all var(--t); font-family: var(--font);
    }
    .chip:hover { border-color: var(--accent); color: var(--acc-h); background: var(--acc-s); }

    /* Message rows */
    .msg-row {
      display: flex; padding: 3px 18px;
      animation: msgIn .22s ease forwards;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.user      { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-bubble {
      max-width: min(72%, 680px);
      padding: 11px 15px;
      border-radius: var(--r);
      font-size: 14.5px; line-height: 1.72;
    }
    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(91,125,255,.2);
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      background: transparent;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 4px; opacity: 0; transition: opacity var(--t);
    }
    .msg-row:hover .msg-meta { opacity: 1; }
    .msg-time { font-size: 10.5px; color: var(--muted); }
    .msg-action {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 4px; padding: 2px 7px; font-size: 10.5px;
      cursor: pointer; font-family: var(--font);
      transition: all var(--t); display: flex; align-items: center; gap: 3px;
    }
    .msg-action:hover { background: var(--s2); color: var(--text); }
    .msg-action.del:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }

    .search-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--warn);
      background: rgba(245,166,35,.09); border: 1px solid rgba(245,166,35,.2);
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    }

    .file-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--s3); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: 4px 9px;
      font-size: 11.5px; color: var(--dim); margin-bottom: 7px;
    }

    /* Markdown */
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,
    .msg-bubble h4,.msg-bubble h5,.msg-bubble h6 {
      color: var(--text); margin: 14px 0 5px; font-weight: 600; letter-spacing: -.2px;
    }
    .msg-bubble h1 { font-size: 17px; }
    .msg-bubble h2 { font-size: 15.5px; }
    .msg-bubble h3 { font-size: 14.5px; }
    .msg-bubble p  { margin-bottom: 9px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul,.msg-bubble ol { padding-left: 18px; margin-bottom: 9px; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble strong { color: var(--text); font-weight: 600; }
    .msg-bubble em    { color: var(--dim); }
    .msg-bubble a     { color: var(--acc-h); text-decoration: none; border-bottom: 1px solid rgba(91,125,255,.3); }
    .msg-bubble a:hover { border-bottom-color: var(--acc-h); }
    .msg-bubble code  {
      font-family: var(--mono); font-size: 12.5px;
      background: var(--s3); color: #B8E0FF; padding: 1px 5px; border-radius: 4px;
    }
    .msg-bubble pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--border); border-radius: var(--rsm);
      padding: 13px 15px; overflow-x: auto; margin: 9px 0; position: relative;
    }
    .msg-bubble pre code {
      background: transparent !important; padding: 0; border-radius: 0;
      color: inherit; font-size: 12.5px;
    }
    .copy-code {
      position: absolute; top: 7px; right: 7px;
      background: var(--s3); border: 1px solid var(--border);
      color: var(--dim); border-radius: 5px; padding: 2px 8px;
      font-size: 10.5px; cursor: pointer; font-family: var(--font);
      opacity: 0; transition: opacity var(--t), background var(--t);
    }
    .msg-bubble pre:hover .copy-code { opacity: 1; }
    .copy-code:hover { background: var(--s2); color: var(--text); }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 9px 0; font-size: 13px; }
    .msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .msg-bubble th { background: var(--s2); color: var(--text); font-weight: 600; }
    .msg-bubble td { color: var(--dim); }
    .msg-bubble tr:hover td { background: var(--s2); color: var(--text); }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 7px 0; color: var(--dim); }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Typing */
    .typing-row {
      display: flex; padding: 6px 18px; align-items: center; gap: 10px;
      animation: msgIn .2s ease forwards;
    }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .typing-dot:nth-child(1) { animation: tbounce 1.2s 0.0s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation: tbounce 1.2s 0.2s ease-in-out infinite; }
    .typing-dot:nth-child(3) { animation: tbounce 1.2s 0.4s ease-in-out infinite; }
    @keyframes tbounce {
      0%,60%,100% { transform:translateY(0); background:var(--muted); }
      30%          { transform:translateY(-6px); background:var(--accent); }
    }
    .typing-label { font-size: 11.5px; color: var(--muted); }

    /* ════════════════════════════════════
       INPUT
    ════════════════════════════════════ */
    #inputWrap { padding: 10px 18px 18px; flex-shrink: 0; border-top: 1px solid rgba(34,35,47,.5); }

    #filePreview { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    #filePreview:empty { display: none; }
    .file-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: 4px 9px;
      font-size: 11.5px; color: var(--dim); max-width: 200px;
    }
    .file-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chip-del { background: none; border: none; color: var(--muted); cursor: pointer;
                     font-size: 13px; transition: color var(--t); flex-shrink: 0; padding: 0; }
    .file-chip-del:hover { color: var(--danger); }

    .input-box {
      display: flex; align-items: flex-end; gap: 6px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px 8px 8px 14px;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .input-box:focus-within {
      border-color: rgba(91,125,255,.38);
      box-shadow: 0 0 0 3px rgba(91,125,255,.05);
    }
    #msgInput {
      flex: 1; outline: none; background: transparent;
      color: var(--text); font-family: var(--font); font-size: 14px;
      line-height: 1.6; min-height: 22px; max-height: 150px;
      overflow-y: auto; word-break: break-word;
    }
    #msgInput:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }
    .input-icons { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .ico-btn {
      width: 30px; height: 30px; border-radius: 7px;
      border: none; background: none; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--t);
    }
    .ico-btn:hover { background: var(--s3); color: var(--dim); }
    #sendBtn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t); flex-shrink: 0;
    }
    #sendBtn:hover { background: var(--acc-h); transform: scale(1.05); }
    #sendBtn:disabled { background: var(--s3); color: var(--muted); cursor: not-allowed; transform: none; }
    .input-hint { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 7px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: var(--s3); border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px; border-radius: 99px;
      font-size: 12.5px; z-index: 999; pointer-events: none;
      opacity: 0; transition: transform .28s ease, opacity .28s ease;
      white-space: nowrap; box-shadow: 0 8px 28px rgba(0,0,0,.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Mobile overlay */
    #mobOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 40;
      backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #mobOverlay.show { opacity: 1; pointer-events: all; }

    /* ════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar {
        position: fixed; top: 0; left: 0; bottom: 0;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,.5); }
      #mobOverlay { display: block; }
      #menuBtn { display: flex; }
      .msg-bubble { max-width: 88%; }
      #inputWrap { padding: 8px 12px 14px; }
      #statusBar { display: none; }
    }
    @media (max-width: 480px) {
      .msg-row { padding: 3px 12px; }
      #chatHeader { padding: 11px 12px; }
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">✦</div>
    <h1 class="login-title">ARIA</h1>
    <p class="login-sub">Masuk untuk menggunakan AI Agent</p>

    <div class="login-field">
      <label class="login-label" for="li-user">Username</label>

             onkeydown="onKey(event)" oninput="onInput()"></div>

          <button class="ico-btn" onclick="document.getElementById('fileIn').click()" title="Lampirkan file">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
'use strict';

// ════════════════════════════════════════════════════════
//  ★  SATU-SATUNYA BARIS YANG LO PERLU UBAH SETELAH DEPLOY GAS
//     Paste URL Web App Google Apps Script lo di sini:
// ════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzyB_pNTmkFI7WvZzLGW9Stm5se86FTODnEpRSnGzPepD3wznW4dqAOjiodrKTYjosf/exec';
// Contoh:
// const GAS_URL = 'https://script.google.com/macros/s/AKfycbz.../exec';

// ════════════════════════════════════════════════════════
//  🔐  LOGIN — credentials di-hash, tidak tampil plain text
// ════════════════════════════════════════════════════════
// Hash SHA-256 dari "proaerithmoon:promoon7145019010"
const AUTH_HASH = 'd4c4d87fa925a765534ba9ca9f4f7ef2257ef14fb44701364722167f2129671b';
const AUTH_KEY  = 'aria_auth_ok';
const MAX_FILE  = 50 * 1024 * 1024; // 50 MB

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
const S = {
  sessions: [],
  curId:    null,
  files:    [],
  loading:  false
};

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
(function boot() {
  // Check if already logged in this session
  if (sessionStorage.getItem(AUTH_KEY) === '1') {
    showApp();
  }
  // Otherwise login screen is already visible
})();

// ════════════════════════════════════════════════════════
//  LOGIN / LOGOUT
// ════════════════════════════════════════════════════════
async function doLogin() {
  const btn  = document.getElementById('loginBtn');
  const user = document.getElementById('li-user').value.trim();
  const pass = document.getElementById('li-pass').value;
  const err  = document.getElementById('loginErr');

  btn.disabled = true;
  err.classList.remove('show');

  try {
    const raw  = user + ':' + pass;
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
    const hash = Array.from(new Uint8Array(buf))
                      .map(b => b.toString(16).padStart(2, '0')).join('');

    if (hash === AUTH_HASH) {
      sessionStorage.setItem(AUTH_KEY, '1');
      showApp();
    } else {
      err.classList.add('show');
      document.getElementById('li-pass').value = '';
      document.getElementById('li-pass').focus();
    }
  } catch (e) {
    err.textContent = 'Error: ' + e.message;
    err.classList.add('show');
  }

  btn.disabled = false;
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hide');
  const app = document.getElementById('app');
  app.classList.add('visible');
  initApp();
}

function logout() {
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

// ════════════════════════════════════════════════════════
//  APP INIT
// ════════════════════════════════════════════════════════
function initApp() {
  loadStorage();
  setupMarked();

  if (S.sessions.length === 0) {
    newSession(false);
  } else {
    const id = S.curId && S.sessions.find(s => s.id === S.curId) ? S.curId : S.sessions[0].id;
    switchSession(id, false);
  }

  renderSidebar();
  setStatus('online');
}

function setupMarked() {
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    },
    breaks: true, gfm: true
  });
}

// ════════════════════════════════════════════════════════
//  STORAGE — sessions persist across browser closes
// ════════════════════════════════════════════════════════
function loadStorage() {
  try { S.sessions = JSON.parse(localStorage.getItem('aria_sessions') || '[]'); } catch(_) { S.sessions = []; }
  S.curId = localStorage.getItem('aria_cur') || null;
}

function saveStorage() {
  try {
    localStorage.setItem('aria_sessions', JSON.stringify(S.sessions));
    localStorage.setItem('aria_cur', S.curId || '');
  } catch(e) { console.warn('Storage full:', e); }
}

// ════════════════════════════════════════════════════════
//  SESSIONS
// ════════════════════════════════════════════════════════
function newSession(save = true) {
  const id  = 'ss_' + Date.now();
  const obj = { id, name: 'New Chat', created: Date.now(), messages: [] };
  S.sessions.unshift(obj);
  S.curId = id;
  if (save) saveStorage();
  renderSidebar();
  renderMsgs();
  setTitle('New Chat');
  closeSb();
}

function switchSession(id, save = true) {
  S.curId = id;
  if (save) saveStorage();
  renderSidebar();
  renderMsgs();
  setTitle(getCur()?.name || 'New Chat');
  closeSb();
}

function deleteSession(id, ev) {
  ev && ev.stopPropagation();
  S.sessions = S.sessions.filter(s => s.id !== id);
  if (S.curId === id) {
    S.sessions.length > 0 ? (S.curId = S.sessions[0].id) : newSession(false);
  }
  saveStorage();
  renderSidebar();
  renderMsgs();
  setTitle(getCur()?.name || 'New Chat');
}

function renameSession(name) {
  const s = getCur();
  if (!s) return;
  const n = name.trim();
  if (n && n !== s.name) { s.name = n; saveStorage(); renderSidebar(); }
}

function autoName(msg) {
  const s = getCur();
  if (!s || s.name !== 'New Chat') return;
  s.name = msg.substring(0, 34) + (msg.length > 34 ? '…' : '');
  setTitle(s.name);
  renderSidebar();
  saveStorage();
}

function getCur() { return S.sessions.find(s => s.id === S.curId) || null; }

// ════════════════════════════════════════════════════════
//  RENDER SIDEBAR
// ════════════════════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sessionList');
  if (!S.sessions.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:12px;padding:18px 10px">Belum ada chat</p>`;
    return;
  }
  el.innerHTML = S.sessions.map(s => `
    <div class="sess-item ${s.id === S.curId ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="sess-icon">💬</span>
      <span class="sess-name">${esc(s.name)}</span>
      <button class="sess-del" onclick="deleteSession('${s.id}',event)" title="Hapus">✕</button>
    </div>`).join('');
}

// ════════════════════════════════════════════════════════
//  RENDER MESSAGES
// ════════════════════════════════════════════════════════
function renderMsgs() {
  const wrap = document.getElementById('messages');
  const s    = getCur();
  if (!s || !s.messages.length) { wrap.innerHTML = welcomeHtml(); return; }

  wrap.innerHTML = s.messages.map(msgHtml).join('');
  wrap.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el);
    addCopyBtn(el.closest('pre'));
  });
  scrollBot();
}

function welcomeHtml() {
  return `
  <div id="welcome">
    <div class="welcome-icon">✦</div>
    <h1 class="welcome-title">Halo, aku ARIA</h1>
    <p class="welcome-sub">AI Agent premium siap bantu kamu — riset, coding, analisis, brainstorming, dan apapun.</p>
    <div class="welcome-chips">
      <button class="chip" onclick="quickSend('Jelaskan konsep machine learning dengan bahasa sederhana')">🧠 Machine Learning</button>
      <button class="chip" onclick="quickSend('Bantu brainstorming ide bisnis startup tech yang inovatif')">💡 Ide Startup</button>
      <button class="chip" onclick="quickSend('Cari berita terkini AI 2025')">🔍 Berita Terkini</button>
      <button class="chip" onclick="quickSend('Tulis Python web scraper sederhana dengan requests & BeautifulSoup')">💻 Python Code</button>
      <button class="chip" onclick="quickSend('Bandingkan React vs Vue vs Angular secara mendalam')">⚖️ Perbandingan</button>
      <button class="chip" onclick="quickSend('Buat strategi pemasaran digital untuk UMKM dengan budget terbatas')">📈 Digital Marketing</button>
    </div>
  </div>`;
}

function msgHtml(msg) {
  const isUser = msg.role === 'user';
  const time   = new Date(msg.ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

  const files = (msg.files || []).map(f =>
    `<div class="file-badge">${fileIcon(f.type || '')} ${esc(f.name)}
      <span style="color:var(--muted);margin-left:3px">${fmtBytes(f.size)}</span></div>`).join('');

  const search = msg.searchUsed
    ? `<div class="search-badge">🔍 Web search digunakan</div>`
    : '';

  const body = isUser
    ? `<div style="white-space:pre-wrap">${esc(msg.content)}</div>`
    : marked.parse(msg.content || '');

  return `
  <div class="msg-row ${msg.role}" data-id="${msg.id}">
    <div>
      ${search}${files}
      <div class="msg-bubble">${body}</div>
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        <button class="msg-action" onclick="copyMsg('${msg.id}')">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg> Salin
        </button>
        <button class="msg-action del" onclick="deleteMsg('${msg.id}')">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg> Hapus
        </button>
      </div>
    </div>
  </div>`;
}

function appendMsg(msg) {
  const wrap = document.getElementById('messages');
  const wel  = wrap.querySelector('#welcome');
  if (wel) wrap.innerHTML = '';

  const div = document.createElement('div');
  div.innerHTML = msgHtml(msg);
  const row = div.firstElementChild;
  wrap.appendChild(row);
  row.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el);
    addCopyBtn(el.closest('pre'));
  });
  scrollBot();
}

function addMsg(role, content, extra = {}) {
  const s = getCur();
  if (!s) return;
  const msg = { id: 'msg_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
                role, content, ts: Date.now(), ...extra };
  s.messages.push(msg);
  saveStorage();
  appendMsg(msg);
  return msg;
}

function deleteMsg(id) {
  const s = getCur();
  if (!s) return;
  s.messages = s.messages.filter(m => m.id !== id);
  saveStorage();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.style.transition='.18s'; el.style.opacity='0'; el.style.transform='scale(.96)';
             setTimeout(() => el.remove(), 200); }
  if (!s.messages.length) renderMsgs();
}

function copyMsg(id) {
  const s = getCur(); if (!s) return;
  const m = s.messages.find(x => x.id === id); if (!m) return;
  navigator.clipboard.writeText(m.content).then(() => toast('✓ Disalin'));
}

function confirmClearChat() {
  if (!confirm('Hapus semua pesan di chat ini?')) return;
  const s = getCur(); if (!s) return;
  s.messages = []; saveStorage(); renderMsgs();
}

function confirmClearAll() {
  if (!confirm('Hapus SEMUA sesi chat? Tidak bisa dibatalkan.')) return;
  S.sessions = []; newSession(false); saveStorage(); renderSidebar(); renderMsgs();
  toast('✓ Semua chat dihapus');
}

function addCopyBtn(pre) {
  if (!pre || pre.querySelector('.copy-code')) return;
  const btn = document.createElement('button');
  btn.className = 'copy-code'; btn.textContent = 'Salin';
  btn.onclick = () => {
    const code = pre.querySelector('code');
    navigator.clipboard.writeText(code.textContent).then(() => {
      btn.textContent = 'Tersalin!'; setTimeout(() => btn.textContent = 'Salin', 1500);
    });
  };
  pre.appendChild(btn);
}

// ════════════════════════════════════════════════════════
//  SEND MESSAGE
// ════════════════════════════════════════════════════════
async function send() {
  if (S.loading) return;

  const inputEl = document.getElementById('msgInput');
  const text    = inputEl.innerText.trim();
  if (!text && !S.files.length) return;

  if (!GAS_URL || GAS_URL === 'PASTE_URL_GAS_LO_DI_SINI') {
    toast('⚠ GAS_URL belum diisi di index.html!'); return;
  }

  const s       = getCur();
  const history = s ? s.messages.slice(-30).map(m => ({ role: m.role, content: m.content })) : [];
  const files   = [...S.files];
  const fNames  = files.map(f => ({ name: f.name, size: f.size, type: f.type }));

  inputEl.innerHTML = '';
  S.files = [];
  document.getElementById('filePreview').innerHTML = '';
  updSendBtn();

  if (text) autoName(text);
  addMsg('user', text || '[File dilampirkan]', { files: fNames });

  showTyping();
  setLoading(true);

  try {
    const filePayload = await toBase64Payload(files);
    const payload     = { message: text || 'Analisis file yang dilampirkan.', history, files: filePayload };

    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify(payload)
    });

    hideTyping();

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.success) {
      addMsg('assistant', data.response, { searchUsed: !!data.searchUsed });
    } else {
      addMsg('assistant', '⚠️ **Error dari server:** ' + esc(data.error || 'Unknown error'));
    }
  } catch (err) {
    hideTyping();
    addMsg('assistant', '⚠️ **Gagal terhubung:** ' + esc(err.message) +
      '\n\nPastikan:\n1. GAS_URL di `index.html` sudah benar\n2. Apps Script sudah di-deploy ulang setelah edit\n3. Akses diatur ke "Anyone"');
  }

  setLoading(false);
}

function quickSend(text) {
  document.getElementById('msgInput').innerText = text;
  updSendBtn();
  send();
}

// ════════════════════════════════════════════════════════
//  FILES
// ════════════════════════════════════════════════════════
function onFiles(inp) {
  Array.from(inp.files).forEach(f => {
    if (f.size > MAX_FILE) { toast('⚠ ' + f.name + ' melebihi batas 50MB'); return; }
    S.files.push(f);
  });
  inp.value = '';
  renderFilePreviews();
  updSendBtn();
}

function renderFilePreviews() {
  document.getElementById('filePreview').innerHTML = S.files.map((f, i) => `
    <div class="file-chip">
      <span>${fileIcon(f.type)}</span>
      <span class="file-chip-name" title="${esc(f.name)}">${esc(f.name)}</span>
      <span style="color:var(--muted);font-size:10.5px">${fmtBytes(f.size)}</span>
      <button class="file-chip-del" onclick="removeFile(${i})">✕</button>
    </div>`).join('');
}

function removeFile(i) { S.files.splice(i, 1); renderFilePreviews(); updSendBtn(); }

function toBase64Payload(files) {
  return Promise.all(files.map(f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res({ name: f.name, mimeType: f.type || 'application/octet-stream', data: r.result.split(',')[1] });
    r.onerror = () => rej(new Error('Gagal baca file: ' + f.name));
    r.readAsDataURL(f);
  })));
}

// ════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function onInput() { updSendBtn(); }
function updSendBtn() {
  const btn = document.getElementById('sendBtn');
  const txt = document.getElementById('msgInput').innerText.trim();
  btn.disabled = (!txt && !S.files.length) || S.loading;
}

function setLoading(v) { S.loading = v; updSendBtn(); setStatus(v ? 'loading' : 'online'); }

function showTyping() {
  if (document.getElementById('typingRow')) return;
  const el = document.createElement('div');
  el.id = 'typingRow'; el.className = 'typing-row';
  el.innerHTML = `<div class="typing-dots">
    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
  </div><span class="typing-label">ARIA sedang berpikir…</span>`;
  document.getElementById('messages').appendChild(el);
  scrollBot();
}

function hideTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function scrollBot() {
  const c = document.getElementById('messages');
  requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
}

function setTitle(name) { document.getElementById('sessionTitle').textContent = name; }

function setStatus(type) {
  const dot  = document.getElementById('statusDot');
  const txt  = document.getElementById('statusText');
  if (!dot || !txt) return;
  dot.className = 'status-dot ' + type;
  txt.textContent = { online: 'Online', loading: 'Thinking…', offline: 'Offline' }[type] || type;
}

function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
}

let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

//  UTILS

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtBytes(b) {
  if (!b) return '';
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'KB';
  return (b/1048576).toFixed(1) + 'MB';
}
function fileIcon(m) {
  if (!m) return '📄';
  if (m.startsWith('image/'))   return '🖼';
  if (m === 'application/pdf')  return '📋';
  if (m.includes('word'))       return '📝';
  if (m.includes('spreadsheet') || m.includes('excel') || m === 'text/csv') return '📊';
  if (m.includes('zip') || m.includes('rar')) return '🗜';
  if (m.startsWith('text/'))    return '📄';
  if (m.startsWith('video/'))   return '🎬';
  if (m.startsWith('audio/'))   return '🎵';
  return '📎';
}
