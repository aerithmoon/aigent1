<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARIA — AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />

  <style>
    :root {
      --bg:        #080910;
      --bg-sb:     #06070D;
      --s1:        #0F1018;
      --s2:        #161721;
      --s3:        #1E1F2C;
      --s4:        #252638;
      --border:    #1E1F2E;
      --border2:   #272840;
      --text:      #E2E4F0;
      --dim:       #6B6E88;
      --muted:     #363850;
      --accent:    #5B7DFF;
      --acc2:      #7A97FF;
      --acc3:      rgba(91,125,255,.12);
      --acc4:      rgba(91,125,255,.22);
      --acc-glow:  rgba(91,125,255,.35);
      --user-bg:   #161D3F;
      --danger:    #FF5F5F;
      --dan-s:     rgba(255,95,95,.12);
      --ok:        #3FC78A;
      --warn:      #F5A623;
      --mem-color: #B06BFF;
      --mem-s:     rgba(176,107,255,.12);
      --code-bg:   #080A0F;
      --r:         14px;
      --rsm:       9px;
      --sbw:       268px;
      --font:      'Bricolage Grotesque', sans-serif;
      --mono:      'JetBrains Mono', monospace;
      --t:         0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: var(--font); font-size: 15px;
      background: var(--bg); color: var(--text); line-height: 1.6;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ═══════════════════════════════
       BACKGROUND DECORATION
    ═══════════════════════════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(91,125,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(176,107,255,.05) 0%, transparent 60%);
    }

    /* Grid lines */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(91,125,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,125,255,.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 30%, transparent 80%);
    }

    /* ═══════════════════════════════
       LOGIN
    ═══════════════════════════════ */
    #loginScreen {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      transition: opacity .4s ease, transform .4s ease;
    }
    #loginScreen.hide { opacity: 0; transform: scale(1.04); pointer-events: none; }

    .login-card {
      width: 100%; max-width: 370px;
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 20px; padding: 40px 34px;
      box-shadow: 0 0 0 1px rgba(91,125,255,.06), 0 32px 80px rgba(0,0,0,.7);
      position: relative; overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle, rgba(91,125,255,.12), transparent 70%);
      pointer-events: none;
    }

    .login-glyph {
      width: 50px; height: 50px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(91,125,255,.2), rgba(176,107,255,.15));
      border: 1px solid var(--acc4);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(91,125,255,.15);
    }

    .login-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 3px; }
    .login-sub   { font-size: 13px; color: var(--dim); margin-bottom: 26px; }

    .lf { margin-bottom: 14px; }
    .ll {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .6px; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px;
    }
    .li {
      width: 100%; background: var(--bg); border: 1px solid var(--border2);
      border-radius: var(--rsm); color: var(--text); font-family: var(--font);
      font-size: 14px; padding: 11px 13px; outline: none;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .li:focus { border-color: var(--acc-glow); box-shadow: 0 0 0 3px rgba(91,125,255,.08); }
    .li::placeholder { color: var(--muted); }

    .l-err {
      font-size: 12px; color: var(--danger);
      background: var(--dan-s); border: 1px solid rgba(255,95,95,.2);
      border-radius: var(--rsm); padding: 8px 12px; margin-bottom: 12px; display: none;
    }
    .l-err.show { display: block; }

    .l-btn {
      width: 100%; padding: 12px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--rsm); font-family: var(--font);
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background var(--t), transform var(--t), box-shadow var(--t);
      box-shadow: 0 4px 20px rgba(91,125,255,.3);
    }
    .l-btn:hover { background: var(--acc2); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,125,255,.4); }
    .l-btn:active { transform: translateY(0); }
    .l-btn:disabled { background: var(--s4); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ═══════════════════════════════
       APP SHELL
    ═══════════════════════════════ */
    #app {
      display: flex; height: 100vh; overflow: hidden;
      position: relative; z-index: 1;
      opacity: 0; pointer-events: none; transition: opacity .4s ease;
    }
    #app.visible { opacity: 1; pointer-events: all; }

    /* ═══════════════════════════════
       SIDEBAR
    ═══════════════════════════════ */
    #sidebar {
      width: var(--sbw); min-width: var(--sbw);
      background: var(--bg-sb);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 50; transition: transform var(--t);
      position: relative;
    }

    /* Subtle glow on sidebar top */
    #sidebar::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: .4;
    }

    .sb-head { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }

    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #8B6BFF);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(91,125,255,.4);
    }
    .logo-name  { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.2px; }
    .logo-badge {
      font-size: 9.5px; font-weight: 600; color: var(--acc2);
      background: var(--acc3); padding: 2px 7px;
      border-radius: 99px; margin-left: auto;
      border: 1px solid var(--acc4);
    }

    #newChatBtn {
      width: 100%; padding: 9px 12px;
      background: var(--acc3); color: var(--acc2);
      border: 1px solid var(--acc4); border-radius: var(--rsm);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 7px;
      transition: all var(--t);
    }
    #newChatBtn:hover { background: rgba(91,125,255,.18); border-color: var(--acc-glow); }

    /* Sidebar tabs */
    .sb-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .sb-tab {
      flex: 1; padding: 10px 8px; font-size: 12px; font-weight: 500;
      color: var(--dim); background: none; border: none;
      cursor: pointer; transition: all var(--t); font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 5px;
      position: relative;
    }
    .sb-tab.active { color: var(--acc2); }
    .sb-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 99px;
    }
    .sb-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,.02); }

    .sb-badge {
      background: var(--mem-s); color: var(--mem-color);
      border-radius: 99px; padding: 1px 6px; font-size: 10px;
      border: 1px solid rgba(176,107,255,.2);
    }

    .sb-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .sb-panel.active { display: flex; }

    .sb-scroll { flex: 1; overflow-y: auto; padding: 6px; }

    /* Chat sessions */
    .sess-item {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; transition: background var(--t);
    }
    .sess-item:hover { background: var(--s2); }
    .sess-item.active { background: var(--acc3); }
    .sess-item.active .sess-name { color: var(--acc2); }
    .sess-icon { font-size: 12px; opacity: .5; flex-shrink: 0; }
    .sess-name { font-size: 12.5px; color: var(--dim); white-space: nowrap;
                 overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .sess-del {
      opacity: 0; background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 12px;
      transition: all var(--t); flex-shrink: 0;
    }
    .sess-item:hover .sess-del { opacity: 1; }
    .sess-del:hover { color: var(--danger); background: var(--dan-s); }

    /* Memory items */
    .mem-item {
      padding: 9px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border);
      background: var(--s2); margin-bottom: 6px;
      transition: border-color var(--t);
    }
    .mem-item:hover { border-color: rgba(176,107,255,.2); }

    .mem-type {
      font-size: 9.5px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--mem-color);
      background: var(--mem-s); padding: 1px 6px; border-radius: 99px;
      display: inline-block; margin-bottom: 5px;
    }
    .mem-content { font-size: 12px; color: var(--dim); line-height: 1.5; }
    .mem-ts { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .mem-del {
      float: right; background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 12px; padding: 0;
      transition: color var(--t);
    }
    .mem-del:hover { color: var(--danger); }

    .mem-empty {
      text-align: center; color: var(--muted); font-size: 12px;
      padding: 24px 12px; line-height: 1.7;
    }

    .mem-hint {
      font-size: 11px; color: var(--muted);
      background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: 8px 10px; margin: 8px 6px;
      line-height: 1.6;
    }

    /* Sidebar footer */
    .sb-foot { padding: 10px 6px; border-top: 1px solid var(--border); }
    .sb-foot-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 9px; border-radius: var(--rsm);
      cursor: pointer; background: none; border: none;
      color: var(--dim); font-family: var(--font); font-size: 12.5px;
      transition: all var(--t); width: 100%; text-align: left;
    }
    .sb-foot-btn:hover { background: var(--s2); color: var(--text); }
    .sb-foot-btn.danger:hover { background: var(--dan-s); color: var(--danger); }

    /* ═══════════════════════════════
       MAIN
    ═══════════════════════════════ */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #chatHeader {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px; border-bottom: 1px solid var(--border);
      background: rgba(8,9,16,.85);
      backdrop-filter: blur(12px); flex-shrink: 0;
      position: relative; z-index: 10;
    }

    #menuBtn {
      display: none; background: none; border: none; color: var(--dim);
      cursor: pointer; padding: 5px; border-radius: 7px; transition: all var(--t);
    }
    #menuBtn:hover { background: var(--s2); color: var(--text); }

    #sessionTitle {
      flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
      outline: none; cursor: text; padding: 3px 7px; border-radius: 6px;
      transition: background var(--t); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; letter-spacing: -.2px;
    }
    #sessionTitle:hover { background: var(--s2); }
    #sessionTitle:focus { background: var(--s2); }

    .hdr-r { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    #statusBar { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); flex-shrink: 0; }
    .sdot.loading { background: var(--warn); animation: blink 1.2s ease-in-out infinite; }
    .sdot.offline { background: var(--danger); }

    @keyframes blink { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:.3;transform:scale(.7); } }

    .hdr-btn {
      padding: 5px 11px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: none;
      color: var(--dim); font-family: var(--font); font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all var(--t);
    }
    .hdr-btn:hover { background: var(--s2); color: var(--text); border-color: var(--border2); }
    .hdr-btn.danger:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }

    /* ═══════════════════════════════
       MESSAGES
    ═══════════════════════════════ */
    #messages { flex: 1; overflow-y: auto; padding: 20px 0 8px; display: flex; flex-direction: column; }

    /* Welcome */
    #welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; gap: 18px;
      animation: fadeUp .5s ease forwards;
    }
    @keyframes fadeUp { from { opacity:0;transform:translateY(14px); } to { opacity:1;transform:translateY(0); } }

    .welcome-orb {
      width: 72px; height: 72px; border-radius: 22px; position: relative;
      background: linear-gradient(135deg, rgba(91,125,255,.15), rgba(176,107,255,.1));
      border: 1px solid var(--acc4);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 40px rgba(91,125,255,.15), inset 0 0 20px rgba(91,125,255,.05);
    }
    .welcome-orb::after {
      content: ''; position: absolute; inset: -1px;
      border-radius: 22px; border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(91,125,255,.3), rgba(176,107,255,.2)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out; mask-composite: exclude;
    }

    .welcome-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.5px; text-align: center; }
    .welcome-sub   { font-size: 13.5px; color: var(--dim); text-align: center; max-width: 360px; line-height: 1.7; }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 520px; }
    .chip {
      padding: 7px 14px; border-radius: 99px;
      border: 1px solid var(--border2); background: var(--s2);
      color: var(--dim); font-size: 12.5px; cursor: pointer;
      transition: all var(--t); font-family: var(--font);
    }
    .chip:hover { border-color: var(--acc4); color: var(--acc2); background: var(--acc3);
                  box-shadow: 0 0 12px rgba(91,125,255,.12); }

    /* Messages */
    .msg-row {
      display: flex; padding: 3px 20px;
      animation: msgIn .22s ease forwards;
    }
    @keyframes msgIn { from { opacity:0;transform:translateY(6px); } to { opacity:1;transform:translateY(0); } }

    .msg-row.user      { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-bubble {
      max-width: min(72%, 700px);
      padding: 11px 15px; border-radius: var(--r);
      font-size: 14.5px; line-height: 1.72;
    }
    .msg-row.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(91,125,255,.18);
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      background: transparent;
      border-left: 2px solid rgba(91,125,255,.2);
      padding-left: 14px;
      border-bottom-left-radius: 4px;
    }

    .msg-meta {
      display: flex; align-items: center; gap: 6px;
      margin-top: 5px; opacity: 0; transition: opacity var(--t);
      flex-wrap: wrap;
    }
    .msg-row:hover .msg-meta { opacity: 1; }
    .msg-time { font-size: 10.5px; color: var(--muted); }
    .msg-action {
      background: none; border: 1px solid var(--border2); color: var(--muted);
      border-radius: 4px; padding: 2px 7px; font-size: 10.5px;
      cursor: pointer; font-family: var(--font);
      transition: all var(--t); display: flex; align-items: center; gap: 3px;
    }
    .msg-action:hover { background: var(--s3); color: var(--text); }
    .msg-action.del:hover { background: var(--dan-s); color: var(--danger); border-color: var(--danger); }
    .msg-action.dl { color: var(--ok); border-color: rgba(63,199,138,.25); }
    .msg-action.dl:hover { background: rgba(63,199,138,.1); color: var(--ok); }

    .search-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--warn);
      background: rgba(245,166,35,.09); border: 1px solid rgba(245,166,35,.2);
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    }
    .mem-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; color: var(--mem-color);
      background: var(--mem-s); border: 1px solid rgba(176,107,255,.2);
      padding: 2px 8px; border-radius: 99px; margin-bottom: 7px;
    }
    .file-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--s3); border: 1px solid var(--border2);
      border-radius: var(--rsm); padding: 4px 9px;
      font-size: 11.5px; color: var(--dim); margin-bottom: 7px; margin-right: 5px;
    }

    /* Markdown */
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3,
    .msg-bubble h4,.msg-bubble h5,.msg-bubble h6 {
      color: var(--text); margin: 14px 0 5px; font-weight: 600; letter-spacing: -.2px;
    }
    .msg-bubble h1 { font-size: 17px; } .msg-bubble h2 { font-size: 15.5px; } .msg-bubble h3 { font-size: 14.5px; }
    .msg-bubble p  { margin-bottom: 9px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul,.msg-bubble ol { padding-left: 18px; margin-bottom: 9px; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble strong { color: var(--text); font-weight: 600; }
    .msg-bubble em    { color: var(--dim); }
    .msg-bubble a     { color: var(--acc2); text-decoration: none; border-bottom: 1px solid rgba(122,151,255,.3); }
    .msg-bubble code  {
      font-family: var(--mono); font-size: 12.5px;
      background: var(--s4); color: #A8D0FF; padding: 1px 5px; border-radius: 4px;
    }
    .msg-bubble pre {
      background: var(--code-bg) !important;
      border: 1px solid var(--border2); border-radius: var(--rsm);
      padding: 13px 15px; overflow-x: auto; margin: 9px 0; position: relative;
    }
    .msg-bubble pre code {
      background: transparent !important; padding: 0; border-radius: 0;
      color: inherit; font-size: 12.5px;
    }
    .copy-code {
      position: absolute; top: 7px; right: 7px;
      background: var(--s4); border: 1px solid var(--border2);
      color: var(--dim); border-radius: 5px; padding: 2px 8px;
      font-size: 10.5px; cursor: pointer; font-family: var(--font);
      opacity: 0; transition: opacity var(--t), background var(--t);
    }
    .msg-bubble pre:hover .copy-code { opacity: 1; }
    .copy-code:hover { background: var(--s3); color: var(--text); }
    .dl-code {
      position: absolute; top: 7px; right: 64px;
      background: rgba(63,199,138,.1); border: 1px solid rgba(63,199,138,.2);
      color: var(--ok); border-radius: 5px; padding: 2px 8px;
      font-size: 10.5px; cursor: pointer; font-family: var(--font);
      opacity: 0; transition: opacity var(--t);
      text-decoration: none; display: inline-block;
    }
    .msg-bubble pre:hover .dl-code { opacity: 1; }
    .msg-bubble table { border-collapse: collapse; width: 100%; margin: 9px 0; font-size: 13px; }
    .msg-bubble th,.msg-bubble td { border: 1px solid var(--border2); padding: 6px 10px; text-align: left; }
    .msg-bubble th { background: var(--s3); color: var(--text); font-weight: 600; }
    .msg-bubble td { color: var(--dim); }
    .msg-bubble tr:hover td { background: var(--s3); color: var(--text); }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 7px 0; color: var(--dim); }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border2); margin: 10px 0; }

    /* Typing */
    .typing-row { display: flex; padding: 8px 20px; align-items: center; gap: 10px; animation: msgIn .2s ease forwards; }

    .typing-dot:nth-child(2) { animation: tb 1.2s .2s ease-in-out infinite; }
    .typing-dot:nth-child(3) { animation: tb 1.2s .4s ease-in-out infinite; }
    @keyframes tb { 0%,60%,100%{transform:translateY(0);background:var(--muted);}30%{transform:translateY(-6px);background:var(--accent);} }
    .typing-label { font-size: 11.5px; color: var(--muted); }

    /* ═══════════════════════════════
       INPUT AREA
    ═══════════════════════════════ */
    #inputWrap {
      padding: 8px 18px 16px; flex-shrink: 0;

    .fc-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; transition: color var(--t); flex-shrink: 0; padding: 0; }
    .fc-del:hover { color: var(--danger); }

    .input-box {
      display: flex; align-items: flex-end; gap: 6px;
      background: var(--s1); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 9px 9px 9px 14px;
      transition: border-color var(--t), box-shadow var(--t);
    }
    .input-box:focus-within {
      border-color: rgba(91,125,255,.4);
      box-shadow: 0 0 0 3px rgba(91,125,255,.06), 0 0 20px rgba(91,125,255,.04);
    }
    #msgInput {
      flex: 1; outline: none; background: transparent; color: var(--text);
      font-family: var(--font); font-size: 14px; line-height: 1.6;
      min-height: 22px; max-height: 150px; overflow-y: auto; word-break: break-word;
    }
    #msgInput:empty::before { content: attr(data-placeholder); color: var(--muted); pointer-events: none; }

    .input-icons { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .ico-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none; background: none;
      color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--t);
    }
    .ico-btn:hover { background: var(--s3); color: var(--dim); }
    #sendBtn {
      width: 34px; height: 34px; border-radius: 9px; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t); flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(91,125,255,.3);
    }
    #sendBtn:hover { background: var(--acc2); transform: scale(1.05); box-shadow: 0 6px 18px rgba(91,125,255,.4); }
    #sendBtn:disabled { background: var(--s3); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .input-hint { text-align: center; font-size: 10.5px; color: var(--muted); margin-top: 7px; }

    /* Toast */
    #toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: var(--s4); border: 1px solid var(--border2);
      color: var(--text); padding: 8px 18px; border-radius: 99px;
      font-size: 12.5px; z-index: 999; pointer-events: none;
      opacity: 0; transition: transform .28s ease, opacity .28s ease;
      white-space: nowrap; box-shadow: 0 8px 28px rgba(0,0,0,.5);
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Mobile overlay */
    #mobOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 40; backdrop-filter: blur(3px);
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #mobOverlay.show { opacity: 1; pointer-events: all; }

    /* ═══════════════════════════════
       RESPONSIVE
    ═══════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,.6); }
      #mobOverlay { display: block; }
      #menuBtn { display: flex; }
      .msg-bubble { max-width: 90%; }
      #inputWrap { padding: 6px 12px 14px; }
      #statusBar { display: none; }
      .welcome-title { font-size: 19px; }
    }
    @media (max-width: 480px) {
      .msg-row { padding: 3px 12px; }
      #chatHeader { padding: 10px 12px; }
    }
  </style>
</head>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script>
'use strict';

// ════════════════════════════════════════════════
//  ★  ISI URL GAS LO DI SINI — SATU KALI SAJA
// ════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwFoIi_FwLWgGepWznHJmIknGWTeq7YYAs4o5mWGO4xXovpH_1jlzKXJbBM_qk13pXl/exec';
// Contoh: 'https://script.google.com/macros/s/AKfycbz.../exec'

// ════════════════════════════════════════════════
//  🔐  LOGIN
// ════════════════════════════════════════════════
const AUTH_HASH = 'd4c4d87fa925a765534ba9ca9f4f7ef2257ef14fb44701364722167f2129671b';
// Hash SHA-256 dari "proaerithmoon:promoon7145019010"
// Untuk ganti: hash baru dari "username:password" di sha256-online.com

const MAX_FILE = 50 * 1024 * 1024;

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
const S = {
  sessions: [], curId: null,
  files: [], loading: false,
  memories: [],
  lastUserMsg: '', lastHistory: []
};

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
(function boot() {
  if (sessionStorage.getItem('aria_auth') === '1') showApp();
})();

// ════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════
async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const u   = document.getElementById('li-u').value.trim();
  const p   = document.getElementById('li-p').value;
  const err = document.getElementById('loginErr');
  btn.disabled = true; err.classList.remove('show');
  try {
    const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(u + ':' + p));
    const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hash === AUTH_HASH) {
      sessionStorage.setItem('aria_auth', '1');
      showApp();
    } else {
      err.classList.add('show');
      document.getElementById('li-p').value = '';
      document.getElementById('li-p').focus();
    }
  } catch(e) { err.textContent = 'Error: '+e.message; err.classList.add('show'); }
  btn.disabled = false;
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('app').classList.add('visible');
  initApp();
}

function logout() { sessionStorage.removeItem('aria_auth'); location.reload(); }

// ════════════════════════════════════════════════
//  APP INIT
// ════════════════════════════════════════════════
function initApp() {
  loadStorage();
  setupMarked();
  if (!S.sessions.length) newSession(false);
  else {
    const id = S.curId && S.sessions.find(s=>s.id===S.curId) ? S.curId : S.sessions[0].id;
    switchSession(id, false);
  }
  renderSidebar();
  setStatus('online');
  loadMemories();
}

function setupMarked() {
  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
      return hljs.highlightAuto(code).value;
    },
    breaks: true, gfm: true
  });
}

// ════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════
function loadStorage() {
  try { S.sessions = JSON.parse(localStorage.getItem('aria_sessions')||'[]'); } catch(_) { S.sessions=[]; }
  S.curId = localStorage.getItem('aria_cur') || null;
}
function saveStorage() {
  try {
    localStorage.setItem('aria_sessions', JSON.stringify(S.sessions));
    localStorage.setItem('aria_cur', S.curId||'');
  } catch(e) { console.warn('Storage full'); }
}

// ════════════════════════════════════════════════
//  SESSIONS
// ════════════════════════════════════════════════
function newSession(save=true) {
  const id  = 'ss_'+Date.now();
  S.sessions.unshift({ id, name:'New Chat', created:Date.now(), messages:[] });
  S.curId = id;
  if (save) saveStorage();
  renderSidebar(); renderMsgs(); setTitle('New Chat'); closeSb();
  document.getElementById('regenBtn').style.display = 'none';
}
function switchSession(id, save=true) {
  S.curId = id;
  if (save) saveStorage();
  renderSidebar(); renderMsgs(); setTitle(getCur()?.name||'New Chat'); closeSb();
  document.getElementById('regenBtn').style.display =
    (getCur()?.messages?.length > 1) ? 'flex' : 'none';
}
function deleteSession(id, ev) {
  ev?.stopPropagation();
  S.sessions = S.sessions.filter(s=>s.id!==id);
  if (S.curId===id) S.sessions.length ? (S.curId=S.sessions[0].id) : newSession(false);
  saveStorage(); renderSidebar(); renderMsgs(); setTitle(getCur()?.name||'New Chat');
}
function renameSession(name) {
  const s = getCur(); if (!s) return;
  const n = name.trim();
  if (n && n!==s.name) { s.name=n; saveStorage(); renderSidebar(); }
}
function autoName(msg) {
  const s = getCur(); if (!s||s.name!=='New Chat') return;
  s.name = msg.substring(0,34)+(msg.length>34?'…':'');
  setTitle(s.name); renderSidebar(); saveStorage();
}
function getCur() { return S.sessions.find(s=>s.id===S.curId)||null; }

// ════════════════════════════════════════════════
//  SIDEBAR TABS
// ════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tabChats').classList.toggle('active', tab==='chats');
  document.getElementById('tabMemory').classList.toggle('active', tab==='memory');
  document.getElementById('panelChats').classList.toggle('active', tab==='chats');
  document.getElementById('panelMemory').classList.toggle('active', tab==='memory');
  if (tab==='memory') loadMemories();
}

// ════════════════════════════════════════════════
//  RENDER SIDEBAR
// ════════════════════════════════════════════════
function renderSidebar() {
  const el = document.getElementById('sessionList');
  if (!S.sessions.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--muted);font-size:12px;padding:20px 10px">Belum ada chat</p>`;
    return;
  }
  el.innerHTML = S.sessions.map(s => `
    <div class="sess-item ${s.id===S.curId?'active':''}" onclick="switchSession('${s.id}')">
      <span class="sess-icon">💬</span>
      <span class="sess-name">${esc(s.name)}</span>
      <button class="sess-del" onclick="deleteSession('${s.id}',event)">✕</button>
    </div>`).join('');
}

// ════════════════════════════════════════════════
//  MEMORY PANEL
// ════════════════════════════════════════════════
async function loadMemories() {
  if (!GAS_URL || GAS_URL==='PASTE_URL_GAS_LO_DI_SINI') return;
  try {
    const res  = await fetch(GAS_URL + '?action=get_memories');
    const data = await res.json();
    if (data.success) {
      S.memories = data.memories || [];
      renderMemoryPanel();
      updateMemBadge();
    }
  } catch(e) { console.warn('Load memories failed:', e); }
}

function renderMemoryPanel() {
  const el     = document.getElementById('memoryList');
  const active = S.memories.filter(m => m.active===true||m.active==='TRUE'||m.active===1);

  if (!active.length) {
    el.innerHTML = `<div class="mem-empty">🧠 Belum ada memori tersimpan.<br><br>Ketik <strong>"ingat bahwa..."</strong> di chat untuk menyimpan memori pertama.</div>`;
    return;
  }

  el.innerHTML = active.map(m => `
    <div class="mem-item" data-mid="${esc(m.id)}">
      <button class="mem-del" onclick="deleteMem('${esc(m.id)}')" title="Hapus">✕</button>
      <span class="mem-type">${esc(m.type||'fact')}</span>
      <div class="mem-content">${esc(m.content)}</div>
      <div class="mem-ts">${esc(m.timestamp||'')}</div>
    </div>`).join('');
}

function updateMemBadge() {
  const active = S.memories.filter(m => m.active===true||m.active==='TRUE'||m.active===1);
  document.getElementById('memCount').textContent = active.length;
}

async function deleteMem(id) {
  if (!confirm('Hapus memori ini?')) return;
  try {
    await fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'delete_memory', memoryId:id })
    });
    await loadMemories();
    toast('🗑️ Memori dihapus');
  } catch(e) { toast('❌ Gagal hapus memori'); }
}

async function clearAllMem() {
  if (!confirm('Hapus SEMUA memori ARIA? Ini akan mempengaruhi semua sesi ke depan.')) return;
  try {
    await fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'clear_memories' })
    });
    await loadMemories();
    toast('🗑️ Semua memori dihapus');
  } catch(e) { toast('❌ Gagal'); }
}

// ════════════════════════════════════════════════
//  RENDER MESSAGES
// ════════════════════════════════════════════════
function renderMsgs() {
  const wrap = document.getElementById('messages');
  const s    = getCur();
  if (!s||!s.messages.length) { wrap.innerHTML = welcomeHtml(); return; }
  wrap.innerHTML = s.messages.map(msgHtml).join('');
  wrap.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el);
    addCodeBtns(el.closest('pre'));
  });
  scrollBot();
}

function welcomeHtml() {
  return `<div id="welcome">
    <div class="welcome-orb">✦</div>
    <h1 class="welcome-title">Halo, aku ARIA</h1>
    <p class="welcome-sub">AI Agent premium siap bantu riset, coding, analisis, brainstorming, dan apapun yang lo butuhkan.</p>
    <div class="chips">
      <button class="chip" onclick="quickSend('Jelaskan machine learning secara sederhana')">🧠 Machine Learning</button>
      <button class="chip" onclick="quickSend('Bantu brainstorming ide startup tech yang inovatif')">💡 Ide Startup</button>
      <button class="chip" onclick="quickSend('Cari berita AI terkini 2025')">🔍 Berita AI</button>
      <button class="chip" onclick="quickSend('Tulis Python web scraper dengan requests dan BeautifulSoup')">💻 Python Code</button>
      <button class="chip" onclick="quickSend('Bandingkan React vs Vue vs Angular secara mendalam')">⚖️ Framework</button>
      <button class="chip" onclick="quickSend('Buat strategi digital marketing untuk UMKM budget minim')">📈 Marketing</button>
      <button class="chip" onclick="quickSend('ingat bahwa aku lebih suka jawaban singkat dan to the point')">🧠 Set Memori</button>
      <button class="chip" onclick="quickSend('tampilkan memori')">📋 Lihat Memori</button>
    </div>
  </div>`;
}

function msgHtml(msg) {
  const isUser = msg.role==='user';
  const time   = new Date(msg.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  const fileBadges = (msg.files||[]).map(f =>
    `<div class="file-badge">${fileIcon(f.type||'')} ${esc(f.name)} <span style="color:var(--muted)">${fmtBytes(f.size)}</span></div>`
  ).join('');

  const searchBadge = msg.searchUsed ? `<div class="search-badge">🔍 Web search</div>` : '';
  const memBadge    = msg.memoryAction ? `<div class="mem-badge">🧠 Memori ${msg.memoryAction}</div>` : '';

  const body = isUser
    ? `<div style="white-space:pre-wrap">${esc(msg.content)}</div>`
    : marked.parse(msg.content||'');

  // Detect apakah ada codeblock untuk tombol download
  const hasCode = !isUser && (msg.content||'').includes('```');

  return `
  <div class="msg-row ${msg.role}" data-id="${msg.id}">
    <div>
      ${searchBadge}${memBadge}${fileBadges}
      <div class="msg-bubble">${body}</div>
      <div class="msg-meta">
        <span class="msg-time">${time}</span>
        <button class="msg-action" onclick="copyMsg('${msg.id}')">📋 Salin</button>
        ${hasCode ? `<button class="msg-action dl" onclick="downloadCode('${msg.id}')">⬇ Download</button>` : ''}
        <button class="msg-action del" onclick="deleteMsg('${msg.id}')">🗑 Hapus</button>
      </div>
    </div>
  </div>`;
}

function appendMsg(msg) {
  const wrap = document.getElementById('messages');
  const wel  = wrap.querySelector('#welcome');
  if (wel) wrap.innerHTML = '';
  const div = document.createElement('div');
  div.innerHTML = msgHtml(msg);
  const row = div.firstElementChild;
  wrap.appendChild(row);
  row.querySelectorAll('pre code').forEach(el => {
    hljs.highlightElement(el);
    addCodeBtns(el.closest('pre'));
  });
  scrollBot();
}

function addMsg(role, content, extra={}) {
  const s = getCur(); if (!s) return null;
  const msg = { id:'msg_'+Date.now()+'_'+Math.random().toString(36).slice(2,6), role, content, ts:Date.now(), ...extra };
  s.messages.push(msg);
  saveStorage();
  appendMsg(msg);
  return msg;
}

function deleteMsg(id) {
  const s = getCur(); if (!s) return;
  s.messages = s.messages.filter(m=>m.id!==id);
  saveStorage();
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) { el.style.transition='.18s'; el.style.opacity='0'; el.style.transform='scale(.96)'; setTimeout(()=>el.remove(),200); }
  if (!s.messages.length) renderMsgs();
}

function copyMsg(id) {
  const s = getCur(); if (!s) return;
  const m = s.messages.find(x=>x.id===id); if (!m) return;
  navigator.clipboard.writeText(m.content).then(()=>toast('✓ Disalin'));
}

function downloadCode(id) {
  const s = getCur(); if (!s) return;
  const m = s.messages.find(x=>x.id===id); if (!m) return;
  // Extract first code block
  const match = m.content.match(/```(\w*)\n?([\s\S]*?)```/);
  if (!match) { navigator.clipboard.writeText(m.content); toast('✓ Disalin ke clipboard'); return; }
  const lang    = match[1] || 'txt';
  const code    = match[2];
  const extMap  = { python:'py', javascript:'js', typescript:'ts', html:'html', css:'css',
                    java:'java', cpp:'cpp', c:'c', go:'go', rust:'rs', php:'php',
                    sql:'sql', bash:'sh', text:'txt', txt:'txt' };
  const ext     = extMap[lang.toLowerCase()] || 'txt';
  const blob    = new Blob([code], {type:'text/plain'});
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href = url; a.download = 'aria_output_'+Date.now()+'.'+ext;
  a.click(); URL.revokeObjectURL(url);
  toast('⬇ File diunduh');
}

function addCodeBtns(pre) {
  if (!pre||pre.querySelector('.copy-code')) return;
  const lang = pre.querySelector('code')?.className?.replace('language-','') || 'txt';
  // Copy button
  const btn  = document.createElement('button');
  btn.className = 'copy-code'; btn.textContent = 'Salin';
  btn.onclick = () => {
    navigator.clipboard.writeText(pre.querySelector('code').textContent)
      .then(()=>{ btn.textContent='Tersalin!'; setTimeout(()=>btn.textContent='Salin',1500); });
  };
  pre.appendChild(btn);
  // Download button
  const dlBtn = document.createElement('a');
  dlBtn.className = 'dl-code'; dlBtn.textContent = '⬇';
  dlBtn.title = 'Download kode ini';
  dlBtn.onclick = (e) => {
    e.preventDefault();
    const extMap = {python:'py',javascript:'js',typescript:'ts',html:'html',css:'css',java:'java',
                    cpp:'cpp',c:'c',go:'go',rust:'rs',php:'php',sql:'sql',bash:'sh',text:'txt',txt:'txt'};
    const ext  = extMap[lang.toLowerCase()]||'txt';
    const blob = new Blob([pre.querySelector('code').textContent],{type:'text/plain'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='aria_code_'+Date.now()+'.'+ext;
    a.click(); URL.revokeObjectURL(url);
    toast('⬇ Kode diunduh');
  };
  pre.appendChild(dlBtn);
}

function confirmClearChat() {
  if (!confirm('Hapus semua pesan di chat ini?')) return;
  const s=getCur(); if (!s) return;
  s.messages=[]; saveStorage(); renderMsgs();
  document.getElementById('regenBtn').style.display='none';
}

function confirmClearAll() {
  if (!confirm('Hapus SEMUA sesi? Tidak bisa dibatalkan.')) return;
  S.sessions=[]; newSession(false); saveStorage(); renderSidebar(); renderMsgs();
  toast('✓ Semua chat dihapus');
}

// ════════════════════════════════════════════════
//  SEND
// ════════════════════════════════════════════════
async function send() {
  if (S.loading) return;
  const inputEl = document.getElementById('msgInput');
  const text    = inputEl.innerText.trim();
  if (!text && !S.files.length) return;

  if (!GAS_URL||GAS_URL==='PASTE_URL_GAS_LO_DI_SINI') {
    toast('⚠ GAS_URL belum diisi di index.html!'); return;
  }

  const s       = getCur();
  const history = s ? s.messages.slice(-30).map(m=>({role:m.role,content:m.content})) : [];
  const files   = [...S.files];
  const fNames  = files.map(f=>({name:f.name,size:f.size,type:f.type}));

  S.lastUserMsg = text;
  S.lastHistory = history;

  inputEl.innerHTML=''; S.files=[]; document.getElementById('filePreview').innerHTML=''; updSendBtn();
  if (text) autoName(text);
  addMsg('user', text||'[File dilampirkan]', {files:fNames});
  showTyping(); setLoading(true);

  try {
    const filePayload = await toBase64(files);
    const payload = { message:text||'Analisis file yang dilampirkan.', history, files:filePayload };

    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
    hideTyping();
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    if (data.success) {
      addMsg('assistant', data.response, { searchUsed:data.searchUsed, memoryAction:data.memoryAction });
      // Refresh memory panel jika ada aksi memori
      if (data.memoryAction) { await loadMemories(); }
    } else {
      addMsg('assistant', '⚠️ **Error:** '+esc(data.error||'Unknown error'));
    }
  } catch(err) {
    hideTyping();
    addMsg('assistant', '⚠️ **Koneksi gagal:** '+esc(err.message)+'\n\nPastikan GAS_URL benar dan sudah deploy ulang.');
  }

  setLoading(false);
  document.getElementById('regenBtn').style.display = 'flex';
}

async function regenerateLast() {
  if (S.loading) return;
  const s = getCur(); if (!s||s.messages.length<2) return;
  // Hapus jawaban AI terakhir
  const last = s.messages[s.messages.length-1];
  if (last.role!=='assistant') return;
  deleteMsg(last.id);
  // Kirim ulang pesan user terakhir
  const prevUser = s.messages[s.messages.length-1];
  if (!prevUser||prevUser.role!=='user') return;

  const history = s.messages.slice(0,-1).slice(-30).map(m=>({role:m.role,content:m.content}));
  showTyping(); setLoading(true);

  try {
    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ message:prevUser.content, history, files:[] }) });
    hideTyping();
    const data = await res.json();
    if (data.success) addMsg('assistant', data.response, {searchUsed:data.searchUsed});
    else addMsg('assistant', '⚠️ '+esc(data.error||'Error'));
  } catch(err) {
    hideTyping();
    addMsg('assistant', '⚠️ Gagal: '+esc(err.message));
  }
  setLoading(false);
}

function quickSend(text) {
  document.getElementById('msgInput').innerText = text;
  updSendBtn(); send();
}

// ════════════════════════════════════════════════
//  FILES
// ════════════════════════════════════════════════
function onFiles(inp) {
  Array.from(inp.files).forEach(f => {
    if (f.size>MAX_FILE) { toast('⚠ '+f.name+' > 50MB'); return; }
    S.files.push(f);
  });
  inp.value=''; renderFilePreviews(); updSendBtn();
}
function renderFilePreviews() {
  document.getElementById('filePreview').innerHTML = S.files.map((f,i)=>`
    <div class="file-chip">
      <span>${fileIcon(f.type)}</span>
      <span class="file-chip-name">${esc(f.name)}</span>
      <span style="color:var(--muted);font-size:10.5px">${fmtBytes(f.size)}</span>
      <button class="fc-del" onclick="S.files.splice(${i},1);renderFilePreviews();updSendBtn()">✕</button>
    </div>`).join('');
}
function toBase64(files) {
  return Promise.all(files.map(f=>new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res({name:f.name,mimeType:f.type||'application/octet-stream',data:r.result.split(',')[1]});
    r.onerror=()=>rej(new Error('File read failed'));
    r.readAsDataURL(f);
  })));
}

// ════════════════════════════════════════════════
//  EXPORT CHAT
// ════════════════════════════════════════════════
function exportChat() {
  const s = getCur();
  if (!s||!s.messages.length) { toast('⚠ Tidak ada chat untuk di-export'); return; }
  let txt = 'ARIA Chat Export\n';
  txt += 'Sesi: '+s.name+'\n';
  txt += 'Tanggal: '+new Date().toLocaleString('id-ID')+'\n';
  txt += '═'.repeat(50)+'\n\n';
  s.messages.forEach(m => {
    const who  = m.role==='user' ? 'Kamu' : 'ARIA';
    const time = new Date(m.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    txt += `[${time}] ${who}:\n${m.content}\n\n${'─'.repeat(40)}\n\n`;
  });
  const blob = new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='aria_chat_'+Date.now()+'.txt';
  a.click(); URL.revokeObjectURL(url);
  toast('⬇ Chat di-export');
}

// ════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function onInput() { updSendBtn(); }
function updSendBtn() {
  const btn=document.getElementById('sendBtn');
  const txt=document.getElementById('msgInput').innerText.trim();
  btn.disabled=(!txt&&!S.files.length)||S.loading;
}
function setLoading(v) { S.loading=v; updSendBtn(); setStatus(v?'loading':'online'); }

function showTyping() {
  if(document.getElementById('tr')) return;
  const el=document.createElement('div');
  el.id='tr'; el.className='typing-row';
  el.innerHTML=`<div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div><span class="typing-label">ARIA sedang berpikir…</span>`;
  document.getElementById('messages').appendChild(el); scrollBot();
}
function hideTyping() { document.getElementById('tr')?.remove(); }
function scrollBot() { const c=document.getElementById('messages'); requestAnimationFrame(()=>c.scrollTop=c.scrollHeight); }
function setTitle(n) { document.getElementById('sessionTitle').textContent=n; }
function setStatus(type) {
  const dot=document.getElementById('statusDot'), txt=document.getElementById('statusText');
  if(!dot||!txt) return;
  dot.className='sdot '+type;
  txt.textContent={online:'Online',loading:'Thinking…',offline:'Offline'}[type]||type;
}

function toggleSb() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show');
}
function closeSb() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
}

let _tt;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2600);
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtBytes(b) {
  if(!b) return '';
  if(b<1024) return b+'B';
  if(b<1048576) return (b/1024).toFixed(1)+'KB';
  return (b/1048576).toFixed(1)+'MB';
}
function fileIcon(m) {
  if(!m) return '📄';
  if(m.startsWith('image/'))  return '🖼';
  if(m==='application/pdf')   return '📋';
  if(m.includes('word'))      return '📝';
  if(m.includes('spreadsheet')||m.includes('excel')||m==='text/csv') return '📊';
  if(m.includes('zip')||m.includes('rar')) return '🗜';
  if(m.startsWith('text/'))   return '📄';
  if(m.startsWith('video/'))  return '🎬';
  if(m.startsWith('audio/'))  return '🎵';
  return '📎';
}
